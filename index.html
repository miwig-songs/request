<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Midnight With Groove — 신청곡</title>
  <style>
    :root {
      /* Material 3 Base (dark) */
      --md-sys-color-background: #121212;
      --md-sys-color-surface: #1e1e1e;
      --md-sys-color-on-surface: #ffffff;
      --md-sys-color-on-surface-variant: #b3b3b3;
      --md-sys-color-primary: #5F4B8B;
      --md-sys-color-on-primary: #ffffff;

      /* Spacing */
      --md-ref-typeface: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      --md-ref-type-size: 16px;

      /* Shape & shadow */
      --md-shape-corner-extra-small: 4px;
      --md-shape-corner-small: 8px;
      --md-shape-corner-medium: 12px;
      --md-shape-corner-large: 16px;
      --md-elevation-low: 0 1px 3px rgba(0,0,0,0.12);
      --md-elevation-medium: 0 4px 8px rgba(0,0,0,0.15);
      --md-ref-motion-easing-quick: 0.4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--md-ref-typeface); }

    body {
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background-color: var(--md-sys-color-background);
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 20px;
      box-shadow: var(--md-elevation-medium);
      margin-bottom: 20px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container img {
      height: 24px;
      cursor: pointer;
    }

    main {
      flex: 1;
      padding: 24px 20px;
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .search-header {
      font-size: 20px;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .search-card {
      background-color: var(--md-sys-color-surface);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: var(--md-elevation-medium);
      margin-bottom: 16px;
      position: relative;
    }

    .search-input-container {
      display: flex;
      align-items: center;
    }

    .search-input {
      flex: 1;
      padding: 12px 20px;
      border: none;
      background-color: transparent;
      border-radius: var(--md-shape-corner-medium);
      color: var(--md-sys-color-on-surface);
      font-size: 16px;
      outline: 2px solid rgba(255,255,255,0.05);
      transition: outline-color 0.2s ease;
    }

    .search-input:focus {
      outline-color: var(--md-sys-color-primary);
    }

    .search-btn {
      margin-left: 10px;
      padding: 10px 14px;
      border: none;
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(95,75,139,0.2);
    }

    .track-list {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .track-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      background-color: var(--md-sys-color-surface);
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      margin-bottom: 6px;
    }

    .track-item:hover {
      background-color: #2a2a2a;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .track-item img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      margin-right: 12px;
    }

    .track-info {
      flex: 1;
      overflow: hidden;
    }

    .track-title {
      font-size: 15px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-results {
      text-align: center;
      padding: 30px 20px;
      background-color: var(--md-sys-color-surface);
      border-radius: 12px;
      box-shadow: var(--md-elevation-medium);
      margin-bottom: 20px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
    }

    .request-card {
      background-color: var(--md-sys-color-surface);
      border-radius: 16px;
      padding: 20px 20px 24px;
      box-shadow: var(--md-elevation-medium);
      margin-bottom: 24px;
    }

    .request-card img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 16px;
    }

    .request-card h3 {
      font-size: 17px;
      margin-bottom: 4px;
    }

    .request-card .track-meta {
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 16px;
    }

    .nickname-input {
      margin-bottom: 16px;
    }

    .nickname-input input {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background-color: rgba(255,255,255,0.03);
      color: var(--md-sys-color-on-surface);
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s ease;
    }

    .nickname-input input:focus {
      box-shadow: 0 4px 8px rgba(95,75,139,0.15);
    }

    .request-btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 16px;
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(95,75,139,0.25);
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .request-btn:hover {
      background-color: #735bA6;
      box-shadow: 0 6px 16px rgba(95,75,139,0.3);
    }

    .request-btn:active {
      transform: scale(0.97);
    }

    footer {
      padding: 24px 20px;
      background-color: var(--md-sys-color-background);
      border-top: 1px solid #2a2a2a;
      text-align: center;
    }

    footer p {
      color: var(--md-sys-color-on-surface-variant);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .loader {
      text-align: center;
      padding: 30px 20px;
      color: var(--md-sys-color-primary);
      font-size: 16px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container" onclick="location.href='.'">
      <img src="logo.jpg" alt="Midnight With Groove">
    </div>
  </header>

  <main>
    <div class="search-header">곡 검색</div>

    <div class="search-card">
      <div class="search-input-container">
        <input type="text" id="searchInput" class="search-input" placeholder="곡명 또는 아티스트">
        <button class="search-btn" onclick="searchMusic()">🔍</button>
      </div>
    </div>

    <div id="loader" class="loader" style="display:none;">로딩 중</div>
    <div class="track-list" id="trackList"></div>

    <div class="request-card" id="requestArea" style="display:none;">
      <img id="selImage" src="" alt="앨범" />
      <h3 id="selTitle"></h3>
      <p id="selArtist"></p>
      <p class="track-meta" id="selMeta"></p>
      <div class="nickname-input">
        <input type="text" id="nickname" placeholder="닉네임" />
      </div>
      <button class="request-btn" onclick="submitRequest()">신청하기</button>
    </div>
  </main>

  <footer>
    <p>Midnight With Groove</p>
    <p id="currentDate"></p>
  </footer>

  <script>
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ko-KR');

    const GOOGLE_SCRIPT_URL = '여기에_웹앱_URL을_넣으세요';

    let currentTrack = null;

    function searchMusic() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      document.getElementById('trackList').innerHTML = '';
      document.getElementById('requestArea').style.display = 'none';
      document.getElementById('loader').style.display = 'block';

      const script = document.createElement('script');
      script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&country=KR&limit=10&callback=handleTracks`;
      document.body.appendChild(script);
    }

    function handleTracks(data) {
      const loader = document.getElementById('loader');
      loader.style.display = 'none';

      const trackList = document.getElementById('trackList');
      trackList.innerHTML = '';

      if (data.results.length === 0) {
        trackList.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
        return;
      }

      data.results.forEach(track => {
        const thumb = track.artworkUrl100.replace('100x100bb', '150x150bb');
        const item = document.createElement('div');
        item.className = 'track-item';
        item.onclick = () => selectTrack(track, thumb);
        item.innerHTML = `
          <img src="${thumb}" />
          <div class="track-info">
            <div class="track-title">${track.trackName}</div>
            <div class="track-artist">${track.artistName}</div>
          </div>
        `;
        trackList.appendChild(item);
      });
    }

    function selectTrack(track, thumb) {
      const searchString = `${track.artistName} ${track.trackName} official audio`;
      const ytMusicUrl = `https://music.youtube.com/search?q=${encodeURIComponent(searchString)}`;

      currentTrack = {
        song: track.trackName,
        artist: track.artistName,
        album: track.collectionName,
        thumbnail: thumb.replace('150x150bb', '300x300bb'),
        link: ytMusicUrl
      };

      document.getElementById('trackList').innerHTML = '';
      document.getElementById('requestArea').style.display = 'block';

      document.getElementById('selImage').src = currentTrack.thumbnail;
      document.getElementById('selTitle').innerText = currentTrack.song;
      document.getElementById('selArtist').innerText = currentTrack.artist;
      document.getElementById('selMeta').innerText = currentTrack.album;
    }

    async function submitRequest() {
      const nickname = document.getElementById('nickname').value.trim();
      if (!nickname) {
        alert('닉네임을 입력해주세요.');
        return;
      }

      if (!currentTrack) {
        alert('곡을 먼저 선택해주세요.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = '전송 중...';

      const payload = { ...currentTrack, nickname };

      try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'application/json' }
        });
        if (res.ok) {
          alert('신청 완료');
          location.reload();
        } else {
          alert('전송 실패');
        }
      } catch (err) {
        alert('오류');
      } finally {
        btn.disabled = false;
        btn.innerText = '신청하기';
      }
    }
  </script>
</body>
</html>

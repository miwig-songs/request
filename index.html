<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Midnight With Groove - 신청곡</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #ffffff;
      --text-sub: #b3b3b3;
      --accent: #5F4B8B;
      --border-color: #2a2a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Pretendard', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header, footer {
      background-color: var(--bg-color);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .logo-container img {
      height: 24px;
    }

    .main {
      flex: 1;
      padding: 32px 20px;
      max-width: 500px;
      margin: 0 auto;
    }

    .search-header {
      font-size: 20px;
      margin-bottom: 24px;
    }

    .search-bar {
      margin-bottom: 24px;
    }

    .search-bar input {
      width: 100%;
      padding: 16px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      color: var(--text-main);
      font-size: 16px;
      outline: none;
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    .search-btn {
      margin-top: 8px;
      padding: 10px 16px;
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .track-list {
      margin-bottom: 32px;
    }

    .track-item {
      display: flex;
      align-items: center;
      padding: 12px 10px;
      border-radius: 12px;
      background-color: var(--card-bg);
      margin-bottom: 8px;
      cursor: pointer;
    }

    .track-item:hover {
      background-color: rgba(95, 75, 139, 0.15);
    }

    .track-item img {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      object-fit: cover;
      margin-right: 16px;
    }

    .track-info {
      flex: 1;
      overflow: hidden;
    }

    .track-title {
      font-size: 16px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 14px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-results {
      text-align: center;
      padding: 32px;
      background-color: var(--card-bg);
      border-radius: 12px;
      margin-bottom: 24px;
      color: #999;
      font-size: 14px;
    }

    .request-area {
      display: none;
      padding: 24px;
      background-color: var(--card-bg);
      border-radius: 16px;
      margin-bottom: 32px;
      border: 1px solid var(--accent);
    }

    .request-card img {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      margin-bottom: 16px;
      object-fit: cover;
    }

    .request-card h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .request-card .track-meta {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    .nickname-input {
      margin-bottom: 16px;
    }

    .nickname-input input {
      width: 100%;
      padding: 16px;
      background-color: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      color: var(--text-main);
      font-size: 16px;
      text-align: center;
    }

    .request-btn {
      width: 100%;
      padding: 16px;
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container" onclick="location.href='.'">
      <!-- 현재 레포루트에 logo.jpg가 있음 -->
      <img src="logo.jpg" alt="Midnight With Groove" />
    </div>
  </header>

  <main class="main">
    <div class="search-header">곡 검색</div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="곡명 또는 아티스트" />
      <button class="search-btn" onclick="searchMusic()">검색</button>
    </div>

    <div id="loader" style="display:none;padding:24px">로딩</div>
    <div class="track-list" id="trackList"></div>

    <div class="request-area" id="requestArea">
      <div class="request-card">
        <img id="selImage" src="" alt="Album" />
        <h3 id="selTitle"></h3>
        <p id="selArtist"></p>
        <p class="track-meta" id="selMeta"></p>
      </div>
      <div class="nickname-input">
        <input type="text" id="nickname" placeholder="닉네임" />
      </div>
      <button class="request-btn" onclick="submitRequest()">신청하기</button>
    </div>
  </main>

  <footer>
    <p>Midnight With Groove</p>
    <p id="currentDate"></p>
  </footer>

  <script>
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ko-KR');

    const GOOGLE_SCRIPT_URL = '여기에_웹앱_URL을_넣으세요';

    let currentTrack = null;

    async function searchMusic() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      document.getElementById('trackList').innerHTML = '';
      document.getElementById('requestArea').style.display = 'none';
      document.getElementById('loader').style.display = 'block';

      const script = document.createElement('script');
      script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&country=KR&limit=10&callback=handleTracks`;
      document.body.appendChild(script);
    }

    function handleTracks(data) {
      const loader = document.getElementById('loader');
      loader.style.display = 'none';

      const trackList = document.getElementById('trackList');
      trackList.innerHTML = '';

      if (data.results.length === 0) {
        trackList.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
        return;
      }

      data.results.forEach(track => {
        const thumb = track.artworkUrl100.replace('100x100bb', '150x150bb');
        const item = document.createElement('div');
        item.className = 'track-item';
        item.onclick = () => selectTrack(track, thumb);
        item.innerHTML = `
          <img src="${thumb}" />
          <div class="track-info">
            <div class="track-title">${track.trackName}</div>
            <div class="track-artist">${track.artistName}</div>
          </div>
        `;
        trackList.appendChild(item);
      });
    }

    function selectTrack(track, thumb) {
      const searchString = `${track.artistName} ${track.trackName} official audio`;
      const ytMusicUrl = `https://music.youtube.com/search?q=${encodeURIComponent(searchString)}`;

      currentTrack = {
        song: track.trackName,
        artist: track.artistName,
        album: track.collectionName,
        thumbnail: thumb.replace('150x150bb', '300x300bb'),
        link: ytMusicUrl
      };

      document.getElementById('trackList').innerHTML = '';
      document.getElementById('requestArea').style.display = 'block';
      document.getElementById('selImage').src = currentTrack.thumbnail;
      document.getElementById('selTitle').innerText = currentTrack.song;
      document.getElementById('selArtist').innerText = currentTrack.artist;
      document.getElementById('selMeta').innerText = currentTrack.album;
    }

    async function submitRequest() {
      const nickname = document.getElementById('nickname').value.trim();
      if (!nickname) {
        alert('닉네임을 입력해주세요.');
        return;
      }

      const btn = document.getElementById('requestBtn');
      btn.disabled = true;

      const payload = { ...currentTrack, nickname };
      try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert('신청 완료');
        location.reload();
      } catch (err) {
        alert('오류');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

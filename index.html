<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>미위구 스트리밍 신청곡</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>

/* ════════════════════════════════════════
   Tokens (Premium Native Media App Style)
════════════════════════════════════════ */
:root {
  /* True Black Background */
  --bg:          #000000;
  
  /* Flat Dark Surfaces */
  --surf-1:      #121212;   
  --surf-2:      #181818;   
  --surf-3:      #242424;   

  --border-dim:  rgba(255,255,255,0.08);

  --t-hi:   #FFFFFF;   
  --t-mid:  #A7A7A7;  
  --t-lo:   #727272;   

  --uv:         #5F4B8B;   
  --uv-light:   #D0BCFF;   

  --success:    #1ED760; /* 스포티파이 그린 느낌의 성공 컬러 */

  --r-sm:   4px;
  --r-md:   8px;
  --r-lg:   12px;
  --r-f:    9999px;

  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-std:    cubic-bezier(0.2,  0,    0,    1);
  --t1: 150ms;
  --t2: 250ms;
  --t3: 400ms;

  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
  -webkit-tap-highlight-color: transparent;
  color-scheme: dark;
}

/* ════════════════════════════════════════
   Reset
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; background: var(--bg); }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--t-hi);
  overscroll-behavior: none;
  padding-bottom: calc(40px + env(safe-area-inset-bottom));
}
button { border: none; background: none; cursor: pointer; font: inherit; color: inherit; }
input  { border: none; background: none; outline: none; font: inherit; color: inherit; }
img    { display: block; }
ul     { list-style: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ════════════════════════════════════════
   Header & Search (Apple Music / Spotify Vibe)
════════════════════════════════════════ */
.header-wrap {
  position: sticky;
  top: 0;
  z-index: 300;
  padding: calc(16px + env(safe-area-inset-top)) 16px 12px;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(30px) saturate(200%);
  -webkit-backdrop-filter: blur(30px) saturate(200%);
  border-bottom: 1px solid transparent;
  transition: border-color var(--t1), background var(--t1);
}
.header-wrap.scrolled {
  border-bottom: 1px solid var(--border-dim);
}

.header-brand {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 0 4px;
}
.header-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--t-hi);
  letter-spacing: -0.5px;
  line-height: 1;
}
.header-logo {
  height: 26px;
  width: auto;
  border-radius: 4px;
  display: block;
}

.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 40px; /* iOS 네이티브 폼과 유사한 슬림한 높이 */
  background: var(--surf-3);
  border-radius: 10px;
  padding: 0 12px;
  transition: background var(--t1), box-shadow var(--t1);
}
.search-bar:focus-within {
  background: #333333;
  box-shadow: 0 0 0 1px var(--uv);
}
.search-bar__icon { flex-shrink: 0; width: 18px; height: 18px; color: var(--t-mid); transition: color var(--t1); }
.search-bar:focus-within .search-bar__icon { color: var(--t-hi); }

.search-bar__input { flex: 1; font-size: 16px; color: var(--t-hi); caret-color: var(--uv-light); }
.search-bar__input::placeholder { color: var(--t-mid); font-weight: 400; }

.search-bar__clear {
  flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: var(--t-mid); opacity: 0; pointer-events: none; transition: opacity var(--t1);
}
.search-bar__clear.visible { opacity: 1; pointer-events: auto; }
.search-bar__clear svg { width: 16px; height: 16px; }

/* ════════════════════════════════════════
   Home State (미니멀하고 깨끗하게)
════════════════════════════════════════ */
#homeState {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; padding: 40px 24px; text-align: center;
}
.home-logo { 
  width: 140px; height: 140px; 
  border-radius: var(--r-lg); object-fit: cover; margin-bottom: 24px; 
  box-shadow: 0 12px 40px rgba(0,0,0,0.5); 
}
.home-brand { font-size: 22px; font-weight: 700; color: var(--t-hi); letter-spacing: -0.4px; margin-bottom: 8px; }
.home-sub { font-size: 15px; color: var(--t-mid); line-height: 1.5; max-width: 280px; }

/* ── Footer (유튜브 / 인스타그램) ── */
.app-footer {
  display: flex;
  gap: 24px;
  margin-top: 40px;
}
.social-link {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--t-lo);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color var(--t1);
}
.social-link:hover { color: var(--t-hi); }
.social-link svg { width: 20px; height: 20px; fill: currentColor; }

/* ════════════════════════════════════════
   Loader
════════════════════════════════════════ */
#loader { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 60px 24px; color: var(--t-mid); font-size: 14px; }
#loader.active { display: flex; }
.loader-ring { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--uv); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════
   Results Section & Track List (Edge-to-Edge)
════════════════════════════════════════ */
#resultsSection { display: none; }
#resultsSection.active { display: block; }

.results-header { display: flex; align-items: center; justify-content: flex-start; padding: 16px 16px 8px; }
.results-count { font-size: 14px; font-weight: 700; color: var(--uv-light); letter-spacing: 0.3px; }

#trackList { padding: 0; }

.track-item { animation: fadeUp var(--t3) var(--ease-spring) both; }
.track-item:nth-child(odd)  { animation-delay: 20ms; }
.track-item:nth-child(even) { animation-delay: 40ms; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* 박스형태, 보더 모두 제거 - 네이티브 엣지 투 엣지 스타일 */
.track-row { 
  display: flex; align-items: center; gap: 14px; padding: 8px 16px; 
  background: transparent; cursor: pointer; transition: background var(--t1); user-select: none; 
}
.track-row:active { background: rgba(255,255,255,0.05); }
.track-item.done .track-row { cursor: default; opacity: 0.4; }

/* ── Thumbnail & Audio Preview ── */
.thumb-wrap {
  position: relative; width: 48px; height: 48px; flex-shrink: 0; border-radius: var(--r-sm);
  overflow: hidden; background: var(--surf-3); cursor: pointer;
}
.track-thumb { width: 100%; height: 100%; object-fit: cover; }

.play-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--t1);
}
.thumb-wrap:hover .play-overlay, .thumb-wrap.playing .play-overlay { opacity: 1; }
.icon-play, .icon-pause { color: #fff; width: 20px; height: 20px; }
.icon-pause { display: none; }
.thumb-wrap.playing .icon-play { display: none; }
.thumb-wrap.playing .icon-pause { display: block; }

/* ── Text ── */
.track-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.track-title { font-size: 16px; font-weight: 500; color: var(--t-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.track-sub { font-size: 14px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.track-item.done .track-title { text-decoration: line-through; }

/* ── Trailing ── */
.track-trail { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
.trail-icon { color: var(--t-lo); transition: transform var(--t2) var(--ease-spring); width: 20px; height: 20px; }
.track-item.selected .trail-icon { transform: rotate(90deg); color: var(--t-hi); }
.done-badge { display: none; font-size: 11px; font-weight: 600; color: var(--bg); background: var(--success); border-radius: var(--r-sm); padding: 4px 8px; }
.track-item.done .done-badge { display: inline-flex; }
.track-item.done .trail-icon { display: none; }

/* ════════════════════════════════════════
   Inline Panel (Expanded State)
════════════════════════════════════════ */
.panel-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--t3) var(--ease-spring); }
.track-item.selected .panel-wrap { grid-template-rows: 1fr; }
.panel-inner { overflow: hidden; }

.panel { 
  background: var(--surf-2); 
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
}

.nick-wrap { 
  display: flex; align-items: center; background: var(--surf-3); border-radius: var(--r-md); 
  padding: 0 12px; height: 48px; border: 1px solid transparent; transition: border-color var(--t1);
}
.nick-wrap:focus-within { border-color: var(--uv); }
.nick-input { flex: 1; font-size: 16px; color: var(--t-hi); caret-color: var(--uv-light); }
.nick-input::placeholder { color: var(--t-lo); }
.nick-counter { font-size: 12px; color: var(--t-lo); margin-left: 10px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.nick-counter.near { color: #E2A03F; }

/* ── Submit Button ── */
.submit-btn { 
  width: 100%; height: 50px; border-radius: var(--r-md); background: var(--uv); color: #fff; font-size: 16px; font-weight: 600; 
  display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: background var(--t1), transform var(--t1); 
}
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { background: var(--surf-3); color: var(--t-lo); cursor: not-allowed; transform: none; }
.submit-btn.success { background: var(--success); color: #000; }
.submit-btn.loading { pointer-events: none; }
.submit-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
.submit-btn.loading .submit-spinner { display: block; }
.submit-btn.loading .submit-text, .submit-btn.success .submit-text { display: none; }

.cancel-btn { width: 100%; height: 36px; border-radius: var(--r-md); font-size: 14px; font-weight: 500; color: var(--t-mid); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color var(--t1); }
.cancel-btn:active { color: var(--t-hi); background: rgba(255,255,255,0.05); }

/* ════════════════════════════════════════
   Toast
════════════════════════════════════════ */
#toast {
  position: fixed; bottom: calc(32px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px);
  z-index: 999; background: var(--t-hi); color: var(--bg); border-radius: var(--r-f); padding: 14px 24px; font-size: 14px; font-weight: 600;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity var(--t2) var(--ease-spring), transform var(--t2) var(--ease-spring);
  white-space: nowrap; max-width: calc(100vw - 32px); text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

input[type=search]::-webkit-search-cancel-button { display: none; }
@media (min-width: 600px) {
  .header-wrap, #trackList { max-width: 600px; margin: 0 auto; }
}
</style>
</head>
<body>

<header class="header-wrap" id="headerWrap">
  <div class="header-brand">
    <span class="header-title">Search</span>
    <img class="header-logo" src="https://miwig-songs.github.io/request/logo.jpg" alt="로고">
  </div>
  
  <div class="search-bar" role="search">
    <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" class="search-bar__input" type="search" placeholder="아티스트, 노래, 가사 등" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="search" aria-label="음악 검색">
    <button id="clearBtn" class="search-bar__clear" aria-label="검색어 지우기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
</header>

<section id="homeState" aria-live="polite">
  <img class="home-logo" src="https://miwig-songs.github.io/request/main.jpg" alt="" aria-hidden="true">
  
  <h1 class="home-brand">미위구 스트리밍 신청곡 페이지</h1>
  
  <p class="home-sub">듣고 싶은 곡을 검색해서<br>신청하면 같이 들을 수 있어요!</p>

  <footer class="app-footer">
    <a href="https://www.youtube.com/@midnightwithgroove" target="_blank" rel="noopener" class="social-link" aria-label="유튜브">
      <svg viewBox="0 0 24 24">
        <path d="M21.582 6.186a2.636 2.636 0 0 0-1.854-1.868C18.093 3.883 12 3.883 12 3.883s-6.093 0-7.728.435A2.636 2.636 0 0 0 2.418 6.186C2 7.828 2 12 2 12s0 4.172.418 5.814a2.636 2.636 0 0 0 1.854 1.868c1.635.435 7.728.435 7.728.435s6.093 0 7.728-.435a2.636 2.636 0 0 0 1.854-1.868C22 16.172 22 12 22 12s0-4.172-.418-5.814zM9.995 15.005l.005-6.01L15.5 12l-5.51 3.005z"/>
      </svg>
      YouTube
    </a>
    <a href="http://instagram.com/midnightwithgroove" target="_blank" rel="noopener" class="social-link" aria-label="인스타그램">
      <svg viewBox="0 0 24 24">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
      </svg>
      Instagram
    </a>
  </footer>
</section>

<div id="loader" role="status" aria-label="검색 중">
  <div class="loader-ring"></div>
</div>

<section id="resultsSection" aria-label="검색 결과">
  <div class="results-header">
    <span class="results-count" id="resultsCount"></span>
  </div>
  <ul id="trackList" role="list"></ul>
  <div id="scrollSentinel" style="height: 10px; margin-top: 20px;"></div>
</section>

<div id="toast" role="alert" aria-live="assertive"></div>

<script>
(function() {
  if (window._mWG_initialized) return;
  window._mWG_initialized = true;

  const GAS_URL = '여기에_웹앱_URL_넣기';

  let selItem       = null;
  let selTrack      = null;

  let currentAudio  = null;
  let currentThumb  = null;

  let allResults = [];
  let renderCount = 0;
  const CHUNK_SIZE = 50;

  const savedNickname = localStorage.getItem('mwg_nickname') || '';

  const $headerWrap = document.getElementById('headerWrap');
  const $search  = document.getElementById('searchInput');
  const $clear   = document.getElementById('clearBtn');
  const $home    = document.getElementById('homeState');
  const $loader  = document.getElementById('loader');
  const $results = document.getElementById('resultsSection');
  const $list    = document.getElementById('trackList');
  const $count   = document.getElementById('resultsCount');
  const $toast   = document.getElementById('toast');

  /* 상단 헤더 스크롤 감지 블러 효과 */
  let lastScrollY = window.scrollY;
  let isScrolling = false;
  window.addEventListener('scroll', () => {
    if (!isScrolling) {
      window.requestAnimationFrame(() => {
        const currentScrollY = window.scrollY;
        if (currentScrollY > 10) {
          $headerWrap.classList.add('scrolled');
        } else {
          $headerWrap.classList.remove('scrolled');
        }
        lastScrollY = currentScrollY;
        isScrolling = false;
      });
      isScrolling = true;
    }
  }, { passive: true });

  function stopAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    if (currentThumb) {
      currentThumb.classList.remove('playing');
      currentThumb = null;
    }
  }

  function doSearch(q) {
    q = q.trim();
    if (!q) { showHome(); return; }
    showLoader();
    stopAudio();
    
    const oldScript = document.getElementById('itunes-jsonp');
    if (oldScript) oldScript.remove();

    const s = document.createElement('script');
    s.id = 'itunes-jsonp';
    s.src = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&country=KR&limit=200&callback=_itcb`;
    s.onerror = () => { showHome(); toast('검색 중 오류가 발생했습니다'); };
    document.head.appendChild(s);
  }

  window._itcb = function(data) {
    const s = document.getElementById('itunes-jsonp');
    if (s) s.remove();
    
    allResults = (data && data.results) || [];
    renderCount = 0;
    resetSel();
    $list.innerHTML = '';
    
    if (allResults.length) {
      $count.textContent = `${allResults.length} Songs`;
      loadMore();
      hideAllStates();
      $results.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showEmpty();
    }
  };

  function loadMore() {
    const chunk = allResults.slice(renderCount, renderCount + CHUNK_SIZE);
    if (!chunk.length) return;
    renderList(chunk, renderCount);
    renderCount += chunk.length;
  }

  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && renderCount < allResults.length) {
      loadMore();
    }
  }, { rootMargin: '200px' });
  observer.observe(document.getElementById('scrollSentinel'));

  function renderList(tracks, offsetIndex) {
    tracks.forEach((t, i) => {
      const thumb   = (t.artworkUrl100 || '').replace('100x100', '300x300');
      const song    = t.trackName      || '알 수 없음';
      const artist  = t.artistName     || '';
      const album   = t.collectionName || '';
      const preview = t.previewUrl     || '';
      const ytLink  = `https://music.youtube.com/search?q=${encodeURIComponent(artist + ' ' + song)}`;
      const tdata   = { song, artist, album, thumb, link: ytLink, previewUrl: preview };

      const li = document.createElement('li');
      li.className = 'track-item';

      li.innerHTML = `
        <div class="track-row" tabindex="0" role="button" aria-expanded="false">
          <div class="thumb-wrap" tabindex="0" role="button" aria-label="미리듣기">
            <img class="track-thumb" src="${thumb}" alt="" loading="lazy">
            <div class="play-overlay">
              <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
          </div>
          <div class="track-info">
            <div class="track-title">${esc(song)}</div>
            <div class="track-sub">${esc(artist)}${album ? ' · ' + esc(album) : ''}</div>
          </div>
          <div class="track-trail">
            <svg class="trail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
            <span class="done-badge">완료</span>
          </div>
        </div>
        <div class="panel-wrap">
          <div class="panel-inner">
            <div class="panel">
              <div class="nick-wrap">
                <input class="nick-input" type="text" maxlength="15" placeholder="채팅 닉네임을 입력하세요" autocomplete="off" value="${esc(savedNickname)}">
                <span class="nick-counter">${savedNickname.length} / 15</span>
              </div>
              <button class="submit-btn" type="button">
                <div class="submit-spinner" aria-hidden="true"></div>
                <span class="submit-text">신청하기</span>
                <svg class="submit-check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
              <button class="cancel-btn" type="button">취소</button>
            </div>
          </div>
        </div>`;

      const row       = li.querySelector('.track-row');
      const thumbWrap = li.querySelector('.thumb-wrap');
      const nick      = li.querySelector('.nick-input');
      const ctr       = li.querySelector('.nick-counter');
      const sbtn      = li.querySelector('.submit-btn');
      const checkIcon = li.querySelector('.submit-check');
      const cbtn      = li.querySelector('.cancel-btn');

      if(savedNickname.length >= 13) ctr.classList.add('near');

      thumbWrap.addEventListener('click', (e) => {
        e.stopPropagation(); 
        e.preventDefault();

        if (!preview) { toast('미리듣기를 지원하지 않는 곡입니다.'); return; }

        if (currentAudio && currentThumb === thumbWrap) {
          if (currentAudio.paused) {
            currentAudio.play();
            thumbWrap.classList.add('playing');
          } else {
            currentAudio.pause();
            thumbWrap.classList.remove('playing');
          }
          return;
        }

        stopAudio();
        
        currentAudio = new Audio(preview);
        currentThumb = thumbWrap;
        thumbWrap.classList.add('playing');
        currentAudio.play();

        currentAudio.addEventListener('ended', () => {
          thumbWrap.classList.remove('playing');
          currentAudio = null;
        });
        currentAudio.addEventListener('error', () => {
          toast('미리듣기를 재생할 수 없습니다.');
          stopAudio();
        });
      });

      function select() {
        if (li.classList.contains('done')) return;
        
        const isCurrentlySelected = li.classList.contains('selected');

        document.querySelectorAll('.track-item.selected').forEach(el => {
          if (el !== li) {
            el.classList.remove('selected');
            const r = el.querySelector('.track-row');
            if (r) r.setAttribute('aria-expanded', 'false');
          }
        });

        if (isCurrentlySelected) {
          deselect(); 
          return; 
        }

        selItem  = li;
        selTrack = tdata;
        li.classList.add('selected');
        row.setAttribute('aria-expanded', 'true');
        
        setTimeout(() => { 
          const headerOffset = 110; 
          const elementPosition = li.getBoundingClientRect().top;
          const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
          window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
          
          if (!nick.value) nick.focus(); 
        }, 200);
      }
      row.addEventListener('click', select);
      row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });

      nick.addEventListener('input', () => {
        const n = nick.value.length;
        ctr.textContent = `${n} / 15`;
        ctr.classList.toggle('near', n >= 13);
      });

      sbtn.addEventListener('click', () => {
        const u = nick.value.trim();
        if (!u) { nick.focus(); shake(nick.closest('.nick-wrap')); return; }
        sbtn.classList.add('loading');
        sbtn.disabled = true;
        
        localStorage.setItem('mwg_nickname', u);
        send({ ...selTrack, user: u }, li, sbtn, checkIcon);
      });

      cbtn.addEventListener('click', () => deselect());

      $list.appendChild(li);
    });
  }

  async function send(payload, item, btn, checkIcon) {
    try {
      if (GAS_URL === '여기에_웹앱_URL_넣기') {
        await new Promise(r => setTimeout(r, 800)); 
        triggerSuccess(item, btn, checkIcon);
        return;
      }
      const r = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      if (!r.ok) throw new Error(r.statusText);
      triggerSuccess(item, btn, checkIcon);
    } catch {
      btn.classList.remove('loading');
      btn.disabled = false;
      toast('신청에 실패했습니다. 다시 시도해주세요.');
    }
  }

  function triggerSuccess(item, btn, checkIcon) {
    btn.classList.remove('loading');
    btn.classList.add('success');
    checkIcon.style.display = 'block';
    
    setTimeout(() => {
      onDone(item);
      btn.classList.remove('success');
      btn.disabled = false;
      checkIcon.style.display = 'none';
      btn.querySelector('.submit-text').style.display = 'block';
    }, 800);
  }

  function onDone(item) {
    item.classList.remove('selected');
    item.classList.add('done');
    selItem = selTrack = null;
    toast('신청이 완료되었습니다 🎉');
  }

  function deselect() {
    if (!selItem) return;
    selItem.classList.remove('selected');
    selItem.querySelector('.track-row').setAttribute('aria-expanded', 'false');
    selItem = selTrack = null;
  }

  function resetSel() {
    selItem = selTrack = null;
  }

  function hideAllStates() {
    $home.style.display    = 'none';
    $loader.classList.remove('active');
    $results.classList.remove('active');
  }
  function showHome()   { stopAudio(); hideAllStates(); resetSel(); $home.style.display = 'flex'; }
  function showLoader() { hideAllStates(); resetSel(); $loader.classList.add('active'); }
  function showEmpty() {
    hideAllStates();
    $list.innerHTML = `
      <li style="padding:80px 24px;text-align:center;">
        <p style="font-size:16px;font-weight:600;color:var(--t-hi);">검색 결과가 없습니다</p>
        <p style="font-size:14px;color:var(--t-mid);margin-top:8px;">다른 키워드로 검색해 보세요.</p>
      </li>`;
    $count.textContent = '';
    $results.classList.add('active');
  }

  let _tt = null;
  function toast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => $toast.classList.remove('show'), 2600);
  }

  function shake(el) {
    el.animate([
      { transform: 'translateX(0)' }, { transform: 'translateX(-7px)' },
      { transform: 'translateX(7px)' }, { transform: 'translateX(-4px)' },
      { transform: 'translateX(4px)' }, { transform: 'translateX(0)' }
    ], { duration: 360, easing: 'ease' });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  $search.addEventListener('input', () => {
    const v = $search.value;
    $clear.classList.toggle('visible', v.length > 0);
  });

  $search.addEventListener('keydown', e => {
    if (e.key === 'Enter') { 
      e.preventDefault(); 
      doSearch($search.value); 
      $search.blur(); 
    }
  });

  $clear.addEventListener('click', () => {
    $search.value = '';
    $clear.classList.remove('visible');
    $search.focus();
  });

  showHome();
})();
</script>
</body>
</html>

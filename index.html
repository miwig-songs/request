<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Music App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden;
        }
        
        /* 상단 헤더: 빨간 그라데이션, 중앙 로고, 우측 앱 로고 */
        .header { 
            background: linear-gradient(135deg, #FF3B30 0%, #FF2D55 100%); 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .main-logo { 
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }
        .app-logo { 
            width: 36px; 
            height: 36px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px;
        }
        
        /* 컨텐츠 영역: 세로 1단 리스팅 */
        .content { padding: 24px 20px 100px 20px; }
        .card { 
            background: linear-gradient(145deg, #1C1C1E, #2C2C2E); 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 20px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card-title { 
            font-size: 22px; 
            font-weight: 600; 
            margin-bottom: 6px; 
            line-height: 1.3;
        }
        .card-meta { 
            color: #A1A1A6; 
            font-size: 16px; 
            margin-bottom: 20px;
        }
        .card-buttons { display: flex; gap: 12px; }
        .btn-primary { 
            background: linear-gradient(135deg, #007AFF, #0056CC); 
            color: #fff; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 28px; 
            font-size: 16px; 
            font-weight: 600; 
            min-width: 80px;
        }
        .btn-secondary { 
            background: transparent; 
            color: #fff; 
            border: 1px solid #38383A; 
            padding: 12px 24px; 
            border-radius: 28px; 
            font-size: 16px; 
            font-weight: 600;
        }
        
        /* 하단 네비게이션: 홈/검색/라이브러리만 */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(28,28,30,0.95); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid #38383A; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0;
        }
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #8E8E93; 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 500; 
            padding: 8px;
            transition: color 0.2s;
        }
        .nav-item.active { color: #FFF; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
        
        /* 스크롤바 숨김 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="main-logo"> Music</div>
        <div class="app-logo">♪</div>
    </header>
    
    <!-- 메인 컨텐츠 -->
    <main class="content">
        <!-- 플레이리스트 카드 -->
        <div class="card">
            <div class="card-title">1월 7일 ~ 3월 4일</div>
            <div class="card-meta">1,234곡 • 89시간 30분</div>
            <div class="card-buttons">
                <button class="btn-primary">재생</button>
                <button class="btn-secondary">다운로드</button>
            </div>
        </div>
        
        <!-- Apple Music 1 카드 -->
        <div class="card">
            <div class="card-title">아이폰을 위한 Apple Music 1</div>
            <div class="card-meta">라디오 스테이션</div>
        </div>
        
        <!-- Apple Music 라이브 카드 -->
        <div class="card">
            <div class="card-title">Apple Music 라이브</div>
            <div class="card-meta">라이브 이벤트</div>
        </div>
        
        <!-- 추가 더미 카드들 -->
        <div class="card">
            <div class="card-title">최근 재생한 곡</div>
            <div class="card-meta">15곡 • 1시간 2분</div>
        </div>
    </main>
    
    <!-- 하단 네비 (재생바 제거, 검색버튼 대체) -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <div class="nav-icon">🏠</div>
            <span>홈</span>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">🔍</div>
            <span>검색</span>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">📚</div>
            <span>라이브러리</span>
        </a>
    </nav>
    
    <script>
        // 간단한 인터랙션
        document.querySelectorAll('.btn-primary').forEach(btn => {
            btn.addEventListener('click', () => {
                alert('재생 시작!');
            });
        });
    </script>
</body>
</html>

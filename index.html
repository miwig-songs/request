<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>미위구 스트리밍 신청곡</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>

/* ════════════════════════════════════════
   Cosmic Dark — Design System
════════════════════════════════════════ */
:root {
  --bg:         #07071A;
  --surf-1:     #0D0D24;
  --surf-2:     #111230;
  --surf-3:     #191938;
  --surf-input: #1E1E44;

  --border-dim:  rgba(148,130,255,0.09);
  --border-mid:  rgba(148,130,255,0.18);
  --border-glow: rgba(148,130,255,0.38);

  --t-hi:  #F5F2FF;
  --t-mid: #A89DC8;
  --t-lo:  #635E8A;

  --uv:        #5F4B8B;
  --uv-bright: #9480E0;
  --uv-neon:   #B4A4FF;
  --uv-glow:   rgba(95,75,139,0.45);
  --uv-grad:   linear-gradient(135deg, #5F4B8B 0%, #7D52C4 55%, #A070D8 100%);

  --success:      #1ED760;
  --success-dark: #0D7A34;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-f:  9999px;

  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-std:    cubic-bezier(0.2,  0,    0,    1);
  --t1: 150ms;
  --t2: 260ms;
  --t3: 420ms;

  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-tap-highlight-color: transparent;
  color-scheme: dark;
}

/* ════════════════════════════════════════
   Reset
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; background: var(--bg); }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--t-hi);
  overscroll-behavior: none;
  padding-bottom: calc(44px + env(safe-area-inset-bottom));
}
button { border: none; background: none; cursor: pointer; font: inherit; color: inherit; }
input  { border: none; background: none; outline: none; font: inherit; color: inherit; }
img    { display: block; }
ul     { list-style: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ════════════════════════════════════════
   Cosmic Background
════════════════════════════════════════ */
.cosmic-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 160% 90% at 50% -10%,
      rgba(95,75,139,0.28) 0%, transparent 58%),
    radial-gradient(ellipse 80%  50% at 90%  95%,
      rgba(65,45,115,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 55%  35% at  5%  65%,
      rgba(80,55,130,0.09) 0%, transparent 50%);
}
.cosmic-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle 1px at 18% 22%, rgba(200,190,255,0.55) 0%, transparent 100%),
    radial-gradient(circle 1px at 74% 11%, rgba(200,190,255,0.40) 0%, transparent 100%),
    radial-gradient(circle 1px at 42% 38%, rgba(200,190,255,0.30) 0%, transparent 100%),
    radial-gradient(circle 1px at 88% 52%, rgba(200,190,255,0.45) 0%, transparent 100%),
    radial-gradient(circle 1px at  9% 78%, rgba(200,190,255,0.35) 0%, transparent 100%),
    radial-gradient(circle 1px at 61% 68%, rgba(200,190,255,0.28) 0%, transparent 100%),
    radial-gradient(circle 1px at 31% 85%, rgba(200,190,255,0.38) 0%, transparent 100%),
    radial-gradient(circle 1px at 95%  7%, rgba(200,190,255,0.50) 0%, transparent 100%),
    radial-gradient(circle 2px at 55% 28%, rgba(180,164,255,0.22) 0%, transparent 100%),
    radial-gradient(circle 2px at 22% 55%, rgba(180,164,255,0.18) 0%, transparent 100%);
}

/* ════════════════════════════════════════
   Header
════════════════════════════════════════ */
.header-wrap {
  position: sticky;
  top: 0;
  z-index: 300;
  padding: calc(14px + env(safe-area-inset-top)) 20px 14px;
  background: rgba(7,7,26,0.78);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-bottom: 1px solid transparent;
  transition: border-color var(--t1), background var(--t2);
}
.header-wrap.scrolled {
  background: rgba(7,7,26,0.94);
  border-bottom: 1px solid var(--border-dim);
}

/* ── Brand Row ──
   로고는 absolute 좌측 고정 → 텍스트만 진짜 center
   ───────────────────────────────────────── */
.header-brand {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  margin-bottom: 14px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.header-brand:active { opacity: 0.7; }

.header-logo {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border-radius: 9px;
  object-fit: cover;
  box-shadow:
    0 0 0 1px rgba(148,130,255,0.22),
    0 0 12px rgba(95,75,139,0.50),
    0 0 26px rgba(95,75,139,0.16);
}

.header-text {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
}
.header-title {
  font-size: 18px;
  font-weight: 800;
  font-style: italic;
  letter-spacing: -0.3px;
  line-height: 1.1;
  background: linear-gradient(95deg, #F5F2FF 0%, var(--uv-neon) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--t-lo);
  letter-spacing: 0.3px;
}

/* ── Search Bar ── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 46px;
  background: var(--surf-3);
  border-radius: var(--r-lg);
  padding: 0 14px;
  border: 1px solid var(--border-dim);
  transition: background var(--t1), border-color var(--t2), box-shadow var(--t2);
}
.search-bar:focus-within {
  background: var(--surf-input);
  border-color: var(--uv-bright);
  box-shadow: 0 0 0 3px rgba(148,128,224,0.10), 0 0 22px rgba(95,75,139,0.18);
}
.search-bar__icon {
  flex-shrink: 0;
  width: 18px; height: 18px;
  color: var(--t-mid);
  transition: color var(--t1);
}
.search-bar:focus-within .search-bar__icon { color: var(--uv-neon); }
.search-bar__input { flex: 1; font-size: 16px; caret-color: var(--uv-neon); }
.search-bar__input::placeholder { color: var(--t-lo); }
.search-bar__clear {
  flex-shrink: 0;
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--t-mid); opacity: 0; pointer-events: none;
  transition: opacity var(--t1);
}
.search-bar__clear.visible { opacity: 1; pointer-events: auto; }
.search-bar__clear svg { width: 16px; height: 16px; }

/* ════════════════════════════════════════
   Home State
════════════════════════════════════════ */
#homeState {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 66vh;
  padding: 52px 24px 44px;
  text-align: center;
}
.home-logo {
  width: 128px; height: 128px;
  border-radius: 30px;
  object-fit: cover;
  margin-bottom: 28px;
  box-shadow:
    0 0 0  1px rgba(148,130,255,0.22),
    0 0 18px   rgba(95,75,139,0.45),
    0 0 52px   rgba(95,75,139,0.22),
    0 20px 44px rgba(0,0,0,0.65);
}
.home-brand {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
  background: linear-gradient(130deg, #F5F2FF 0%, var(--uv-neon) 55%, #C0A8FF 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.home-sub {
  font-size: 14px;
  color: var(--t-mid);
  line-height: 1.75;
  max-width: 256px;
}

/* ── Social Footer — 아이콘 없는 3-column 그리드 ── */
.app-footer {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 40px;
  width: 100%;
  max-width: 340px;
}
.social-link {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 11px 6px;
  border-radius: var(--r-f);
  border: 1px solid var(--border-mid);
  background: rgba(148,130,255,0.04);
  color: var(--t-mid);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1px;
  white-space: nowrap;
  transition:
    color        var(--t2),
    border-color var(--t2),
    background   var(--t2),
    box-shadow   var(--t2);
}
.social-link:active,
.social-link:hover {
  color: var(--uv-neon);
  border-color: var(--border-glow);
  background: rgba(148,130,255,0.10);
  box-shadow: 0 0 16px rgba(148,128,224,0.18);
}

/* ════════════════════════════════════════
   Loader
════════════════════════════════════════ */
#loader {
  position: relative;
  z-index: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 80px 24px;
  color: var(--t-mid);
  font-size: 14px;
}
#loader.active { display: flex; }
.loader-ring {
  width: 34px; height: 34px;
  border: 2px solid rgba(148,128,255,0.12);
  border-top-color: var(--uv-bright);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  box-shadow: 0 0 14px var(--uv-glow);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════
   Results
════════════════════════════════════════ */
#resultsSection { position: relative; z-index: 1; display: none; }
#resultsSection.active { display: block; }

.results-header {
  display: flex;
  align-items: center;
  padding: 16px 24px 8px;
}
.results-count {
  font-size: 13px;
  font-weight: 700;
  color: var(--uv-neon);
  letter-spacing: 0.3px;
  text-shadow: 0 0 12px rgba(180,164,255,0.35);
}

#trackList { padding: 0 12px 28px; }

/* ── Track Item ── */
.track-item {
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 2px;
  transition:
    margin     var(--t2) var(--ease-spring),
    opacity    var(--t2) var(--ease-std),
    background var(--t2),
    box-shadow var(--t2);
  animation: fadeUp var(--t3) var(--ease-spring) both;
}
.track-item:nth-child(odd)  { animation-delay: 20ms; }
.track-item:nth-child(even) { animation-delay: 45ms; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0);    }
}

body.has-selection .track-item:not(.selected) { opacity: 0.22; }

.track-item.selected {
  position: relative;
  z-index: 10;
  background: var(--surf-2);
  box-shadow:
    0 0 0  1px rgba(148,130,255,0.20),
    0 0 28px   rgba(95,75,139,0.22),
    0 14px 36px rgba(0,0,0,0.65);
  margin: 8px 0;
}

.track-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 12px;
  background: transparent;
  cursor: pointer;
  border-radius: var(--r-lg);
  transition: background var(--t1);
  user-select: none;
}
.track-row:active { background: rgba(148,130,255,0.06); }
.track-item.selected .track-row { padding: 12px 12px 8px; background: transparent; }
.track-item.selected .track-row:active { background: transparent; }
.track-item.done .track-row { cursor: default; opacity: 0.35; }

/* ── Thumbnail ── */
.thumb-wrap {
  position: relative;
  width: 48px; height: 48px;
  flex-shrink: 0;
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--surf-3);
  cursor: pointer;
  border: 1px solid var(--border-dim);
  transition: box-shadow var(--t2);
}
.thumb-wrap:hover { box-shadow: 0 0 14px rgba(95,75,139,0.35); }
.thumb-wrap.playing {
  box-shadow:
    0 0 0 1px rgba(148,130,255,0.35),
    0 0 18px rgba(95,75,139,0.50);
}
.track-thumb { width: 100%; height: 100%; object-fit: cover; }
.play-overlay {
  position: absolute; inset: 0;
  background: rgba(7,7,26,0.60);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity var(--t1);
}
.thumb-wrap:hover .play-overlay,
.thumb-wrap.playing .play-overlay { opacity: 1; }
.icon-play, .icon-pause {
  color: var(--uv-neon);
  width: 20px; height: 20px;
  filter: drop-shadow(0 0 6px var(--uv-glow));
}
.icon-pause { display: none; }
.thumb-wrap.playing .icon-play  { display: none; }
.thumb-wrap.playing .icon-pause { display: block; }

/* ── Text ── */
.track-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; justify-content: center;
}
.track-title {
  font-size: 16px; font-weight: 600; color: var(--t-hi);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.35;
}
.track-sub {
  font-size: 14px; color: var(--t-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}
.track-item.done .track-title { text-decoration: line-through; }

/* ── Trailing ── */
.track-trail {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
}
.trail-icon {
  color: var(--t-lo);
  width: 18px; height: 18px;
  transition: transform var(--t2) var(--ease-spring), color var(--t1), filter var(--t2);
}
.track-item.selected .trail-icon {
  transform: rotate(90deg);
  color: var(--uv-neon);
  filter: drop-shadow(0 0 5px var(--uv-glow));
}
.done-badge {
  display: none;
  font-size: 11px; font-weight: 700;
  color: #000; background: var(--success);
  border-radius: var(--r-sm); padding: 3px 8px;
}
.track-item.done .done-badge { display: inline-flex; }
.track-item.done .trail-icon { display: none; }

/* ════════════════════════════════════════
   Inline Panel
════════════════════════════════════════ */
.panel-wrap {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows var(--t3) var(--ease-spring);
}
.track-item.selected .panel-wrap { grid-template-rows: 1fr; }
.panel-inner { overflow: hidden; }

.panel {
  background: transparent;
  padding: 4px 12px 18px;
  display: flex; flex-direction: column; gap: 10px;
  border-top: 1px solid rgba(148,130,255,0.07);
  margin-top: 2px;
}

.nick-wrap {
  display: flex; align-items: center;
  background: var(--surf-input);
  border-radius: var(--r-md);
  padding: 0 14px; height: 48px;
  border: 1px solid var(--border-dim);
  transition: border-color var(--t2), box-shadow var(--t2);
}
.nick-wrap:focus-within {
  border-color: var(--uv-bright);
  box-shadow: 0 0 0 2px rgba(148,128,224,0.10), 0 0 18px rgba(95,75,139,0.12);
}
.nick-input { flex: 1; font-size: 15px; caret-color: var(--uv-neon); }
.nick-input::placeholder { color: var(--t-lo); }
.nick-counter {
  font-size: 12px; color: var(--t-lo);
  margin-left: 10px; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.nick-counter.near { color: #E2A03F; }

/* ── Submit ── */
.submit-btn {
  width: 100%; height: 50px;
  border-radius: var(--r-md);
  background: var(--uv-grad);
  color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.2px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer;
  box-shadow: 0 4px 22px rgba(95,75,139,0.40), 0 0 0 1px rgba(148,130,255,0.16);
  transition: transform var(--t1), box-shadow var(--t1);
}
.submit-btn:hover {
  box-shadow: 0 6px 32px rgba(95,75,139,0.55), 0 0 0 1px rgba(148,130,255,0.28);
}
.submit-btn:active  { transform: scale(0.98); box-shadow: none; }
.submit-btn:disabled { background: var(--surf-3); color: var(--t-lo); cursor: not-allowed; transform: none; box-shadow: none; }
.submit-btn.success {
  background: linear-gradient(135deg, var(--success-dark), var(--success));
  color: #000;
  box-shadow: 0 4px 22px rgba(30,215,96,0.30);
}
.submit-btn.loading { pointer-events: none; }
.submit-spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.submit-btn.loading .submit-spinner { display: block; }
.submit-btn.loading .submit-text,
.submit-btn.success .submit-text  { display: none; }

/* ── Cancel ── */
.cancel-btn {
  width: 100%; height: 36px;
  border-radius: var(--r-md);
  font-size: 13px; font-weight: 500; color: var(--t-lo);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: color var(--t1), background var(--t1);
}
.cancel-btn:active { color: var(--t-mid); background: rgba(148,130,255,0.05); }

/* ════════════════════════════════════════
   Toast
════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(32px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 999;
  background: var(--surf-3);
  color: var(--t-hi);
  border: 1px solid var(--border-mid);
  border-radius: var(--r-f);
  padding: 13px 24px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 0 0 1px var(--border-dim), 0 8px 36px rgba(0,0,0,0.65), 0 0 24px rgba(95,75,139,0.18);
  opacity: 0; pointer-events: none;
  transition: opacity var(--t2) var(--ease-spring), transform var(--t2) var(--ease-spring);
  white-space: nowrap; max-width: calc(100vw - 32px); text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

input[type=search]::-webkit-search-cancel-button { display: none; }

@media (min-width: 600px) {
  .header-wrap,
  .results-header,
  #trackList { max-width: 600px; margin: 0 auto; }
}
</style>
</head>
<body>

<div class="cosmic-bg" aria-hidden="true"></div>

<header class="header-wrap" id="headerWrap">
  <div class="header-brand" id="headerHomeLink" role="button" aria-label="메인으로 가기">
    <img class="header-logo"
         src="https://miwig-songs.github.io/request/logo.jpg"
         alt="로고">
    <div class="header-text">
      <span class="header-title">Any Requests?</span>
      <span class="header-sub">미위구 스트리밍 신청곡 페이지</span>
    </div>
  </div>

  <div class="search-bar" role="search">
    <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" class="search-bar__input" type="search"
           placeholder="아티스트, 노래, 가사 등"
           autocomplete="off" autocorrect="off" spellcheck="false"
           enterkeyhint="search" aria-label="음악 검색">
    <button id="clearBtn" class="search-bar__clear" aria-label="검색어 지우기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6"  x2="6"  y2="18"/>
        <line x1="6"  y1="6"  x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<section id="homeState" aria-live="polite">
  <img class="home-logo"
       src="https://miwig-songs.github.io/request/main.jpg"
       alt="" aria-hidden="true">
  <h1 class="home-brand">미위구 스트리밍 신청곡 페이지</h1>
  <p class="home-sub">듣고 싶은 곡을 검색해서<br>신청하면 같이 들을 수 있어요!</p>

  <footer class="app-footer">
    <a href="https://www.youtube.com/@midnightwithgroove"
       target="_blank" rel="noopener"
       class="social-link" aria-label="유튜브">YouTube</a>
    <a href="http://instagram.com/midnightwithgroove"
       target="_blank" rel="noopener"
       class="social-link" aria-label="인스타그램">Instagram</a>
    <a href="https://chzzk.naver.com/d17bed9f876d6a17be54e4f23c3c30d2"
       target="_blank" rel="noopener"
       class="social-link" aria-label="치지직">Chzzk</a>
  </footer>
</section>

<div id="loader" role="status" aria-label="검색 중">
  <div class="loader-ring"></div>
</div>

<section id="resultsSection" aria-label="검색 결과">
  <div class="results-header">
    <span class="results-count" id="resultsCount"></span>
  </div>
  <ul id="trackList" role="list"></ul>
  <div id="scrollSentinel" style="height:10px;margin-top:20px;"></div>
</section>

<div id="toast" role="alert" aria-live="assertive"></div>

<script>
/* ════════════════════════════════════════
   ▼ Google Apps Script 웹앱 URL을 여기에 입력하세요
════════════════════════════════════════ */
const GAS_URL = '여기에_웹앱_URL_넣기';

/* ──────────────────────────────────────── */

(function () {
  if (window._mWG_initialized) return;
  window._mWG_initialized = true;

  let selItem  = null, selTrack  = null;
  let currentAudio = null, currentThumb = null;
  let allResults = [], renderCount = 0;
  const CHUNK_SIZE = 50;
  const savedNickname = localStorage.getItem('mwg_nickname') || '';

  const $headerWrap     = document.getElementById('headerWrap');
  const $headerHomeLink = document.getElementById('headerHomeLink');
  const $search         = document.getElementById('searchInput');
  const $clear          = document.getElementById('clearBtn');
  const $home           = document.getElementById('homeState');
  const $loader         = document.getElementById('loader');
  const $results        = document.getElementById('resultsSection');
  const $list           = document.getElementById('trackList');
  const $count          = document.getElementById('resultsCount');
  const $toast          = document.getElementById('toast');

  /* ── scroll ── */
  let isScrolling = false;
  window.addEventListener('scroll', () => {
    if (!isScrolling) {
      window.requestAnimationFrame(() => {
        $headerWrap.classList.toggle('scrolled', window.scrollY > 10);
        isScrolling = false;
      });
      isScrolling = true;
    }
  }, { passive: true });

  /* ── 홈으로 ── */
  $headerHomeLink.addEventListener('click', () => {
    $search.value = '';
    $clear.classList.remove('visible');
    showHome();
  });

  /* ── audio ── */
  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (currentThumb) { currentThumb.classList.remove('playing'); currentThumb = null; }
  }

  /* ── search ── */
  function doSearch(q) {
    q = q.trim();
    if (!q) { showHome(); return; }
    showLoader();
    stopAudio();
    const old = document.getElementById('itunes-jsonp');
    if (old) old.remove();
    const s = document.createElement('script');
    s.id = 'itunes-jsonp';
    s.src = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&country=KR&limit=200&callback=_itcb`;
    s.onerror = () => { showHome(); toast('검색 중 오류가 발생했습니다'); };
    document.head.appendChild(s);
  }

  window._itcb = function (data) {
    const s = document.getElementById('itunes-jsonp');
    if (s) s.remove();
    allResults = (data && data.results) || [];
    renderCount = 0;
    resetSel();
    $list.innerHTML = '';
    if (allResults.length) {
      $count.textContent = `${allResults.length} Songs`;
      loadMore();
      hideAllStates();
      $results.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showEmpty();
    }
  };

  function loadMore() {
    const chunk = allResults.slice(renderCount, renderCount + CHUNK_SIZE);
    if (!chunk.length) return;
    renderList(chunk);
    renderCount += chunk.length;
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && renderCount < allResults.length) loadMore();
  }, { rootMargin: '200px' });
  observer.observe(document.getElementById('scrollSentinel'));

  /* ── render ── */
  function renderList(tracks) {
    tracks.forEach(t => {
      const thumb   = (t.artworkUrl100 || '').replace('100x100', '300x300');
      const song    = t.trackName      || '알 수 없음';
      const artist  = t.artistName     || '';
      const album   = t.collectionName || '';
      const preview = t.previewUrl     || '';
      const ytLink  = `https://music.youtube.com/search?q=${encodeURIComponent(artist + ' ' + song)}`;
      const tdata   = { song, artist, album, thumb, link: ytLink, previewUrl: preview };

      const li = document.createElement('li');
      li.className = 'track-item';
      li.innerHTML = `
        <div class="track-row" tabindex="0" role="button" aria-expanded="false">
          <div class="thumb-wrap" tabindex="0" role="button" aria-label="미리듣기">
            <img class="track-thumb" src="${thumb}" alt="" loading="lazy">
            <div class="play-overlay">
              <svg class="icon-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
          </div>
          <div class="track-info">
            <div class="track-title">${esc(song)}</div>
            <div class="track-sub">${esc(artist)}${album ? ' · ' + esc(album) : ''}</div>
          </div>
          <div class="track-trail">
            <svg class="trail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
            <span class="done-badge">완료</span>
          </div>
        </div>
        <div class="panel-wrap">
          <div class="panel-inner">
            <div class="panel">
              <div class="nick-wrap">
                <input class="nick-input" type="text" maxlength="15"
                       placeholder="채팅 닉네임을 입력하세요" autocomplete="off"
                       value="${esc(savedNickname)}">
                <span class="nick-counter">${savedNickname.length} / 15</span>
              </div>
              <button class="submit-btn" type="button">
                <div class="submit-spinner" aria-hidden="true"></div>
                <span class="submit-text">신청하기</span>
                <svg class="submit-check" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="3"
                     stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </button>
              <button class="cancel-btn" type="button">취소</button>
            </div>
          </div>
        </div>`;

      const row       = li.querySelector('.track-row');
      const thumbWrap = li.querySelector('.thumb-wrap');
      const nick      = li.querySelector('.nick-input');
      const ctr       = li.querySelector('.nick-counter');
      const sbtn      = li.querySelector('.submit-btn');
      const checkIcon = li.querySelector('.submit-check');
      const cbtn      = li.querySelector('.cancel-btn');

      if (savedNickname.length >= 13) ctr.classList.add('near');

      /* preview */
      thumbWrap.addEventListener('click', e => {
        e.stopPropagation();
        e.preventDefault();
        if (!preview) { toast('미리듣기를 지원하지 않는 곡입니다.'); return; }
        if (currentAudio && currentThumb === thumbWrap) {
          if (currentAudio.paused) { currentAudio.play(); thumbWrap.classList.add('playing'); }
          else { currentAudio.pause(); thumbWrap.classList.remove('playing'); }
          return;
        }
        stopAudio();
        currentAudio = new Audio(preview);
        currentThumb = thumbWrap;
        thumbWrap.classList.add('playing');
        currentAudio.play();
        currentAudio.addEventListener('ended', () => {
          thumbWrap.classList.remove('playing');
          currentAudio = null;
        });
        currentAudio.addEventListener('error', () => {
          toast('미리듣기를 재생할 수 없습니다.');
          stopAudio();
        });
      });

      /* select */
      function select() {
        if (li.classList.contains('done')) return;
        const already = li.classList.contains('selected');
        document.querySelectorAll('.track-item.selected').forEach(el => {
          if (el !== li) {
            el.classList.remove('selected');
            el.querySelector('.track-row').setAttribute('aria-expanded', 'false');
          }
        });
        if (already) { deselect(); return; }
        selItem  = li;
        selTrack = tdata;
        li.classList.add('selected');
        row.setAttribute('aria-expanded', 'true');
        setTimeout(() => {
          const offsetPosition =
            li.getBoundingClientRect().top + window.pageYOffset - 110;
          window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
          if (!nick.value) nick.focus();
        }, 200);
      }
      row.addEventListener('click', select);
      row.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); }
      });

      nick.addEventListener('input', () => {
        const n = nick.value.length;
        ctr.textContent = `${n} / 15`;
        ctr.classList.toggle('near', n >= 13);
      });

      sbtn.addEventListener('click', () => {
        const u = nick.value.trim();
        if (!u) { nick.focus(); shake(nick.closest('.nick-wrap')); return; }
        sbtn.classList.add('loading');
        sbtn.disabled = true;
        localStorage.setItem('mwg_nickname', u);
        send({ ...selTrack, user: u }, li, sbtn, checkIcon);
      });

      cbtn.addEventListener('click', () => deselect());
      $list.appendChild(li);
    });
  }

  /* ── send ── */
  async function send(payload, item, btn, checkIcon) {
    try {
      if (GAS_URL === '여기에_웹앱_URL_넣기') {
        await new Promise(r => setTimeout(r, 800));
        triggerSuccess(item, btn, checkIcon);
        return;
      }
      const r = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      if (!r.ok) throw new Error(r.statusText);
      triggerSuccess(item, btn, checkIcon);
    } catch {
      btn.classList.remove('loading');
      btn.disabled = false;
      toast('신청에 실패했습니다. 다시 시도해주세요.');
    }
  }

  function triggerSuccess(item, btn, checkIcon) {
    btn.classList.remove('loading');
    btn.classList.add('success');
    checkIcon.style.display = 'block';
    setTimeout(() => {
      onDone(item);
      btn.classList.remove('success');
      btn.disabled = false;
      checkIcon.style.display = 'none';
      btn.querySelector('.submit-text').style.display = 'block';
    }, 800);
  }

  function onDone(item) {
    item.classList.remove('selected');
    item.classList.add('done');
    selItem = selTrack = null;
    toast('신청이 완료되었습니다 🎉');
  }

  function deselect() {
    if (!selItem) return;
    selItem.classList.remove('selected');
    selItem.querySelector('.track-row').setAttribute('aria-expanded', 'false');
    selItem = selTrack = null;
  }
  function resetSel() { selItem = selTrack = null; }

  /* ── states ── */
  function hideAllStates() {
    $home.style.display = 'none';
    $loader.classList.remove('active');
    $results.classList.remove('active');
  }
  function showHome() {
    stopAudio(); hideAllStates(); resetSel();
    $home.style.display = 'flex';
  }
  function showLoader() {
    hideAllStates(); resetSel();
    $loader.classList.add('active');
  }
  function showEmpty() {
    hideAllStates();
    $list.innerHTML = `
      <li style="padding:80px 24px;text-align:center;">
        <p style="font-size:16px;font-weight:600;color:var(--t-hi);">검색 결과가 없습니다</p>
        <p style="font-size:14px;color:var(--t-mid);margin-top:8px;">다른 키워드로 검색해 보세요.</p>
      </li>`;
    $count.textContent = '';
    $results.classList.add('active');
  }

  /* ── toast ── */
  let _tt = null;
  function toast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => $toast.classList.remove('show'), 2600);
  }

  /* ── shake ── */
  function shake(el) {
    el.animate([
      { transform: 'translateX(0)'  },
      { transform: 'translateX(-7px)' },
      { transform: 'translateX(7px)'  },
      { transform: 'translateX(-4px)' },
      { transform: 'translateX(4px)'  },
      { transform: 'translateX(0)'  }
    ], { duration: 360, easing: 'ease' });
  }

  /* ── esc ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── input events ── */
  $search.addEventListener('input', () => {
    $clear.classList.toggle('visible', $search.value.length > 0);
  });
  $search.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      doSearch($search.value);
      $search.blur();
    }
  });
  $clear.addEventListener('click', () => {
    $search.value = '';
    $clear.classList.remove('visible');
    $search.focus();
  });

  showHome();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>미위구 스트리밍 신청곡</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
/* ── Cosmic Dark · Design System ─────────────────────────── */
:root {
  --bg:#07071A; --surf-1:#0D0D24; --surf-2:#111230; --surf-3:#191938; --surf-input:#1E1E44;
  --border-dim:rgba(148,130,255,.09); --border-mid:rgba(148,130,255,.18); --border-glow:rgba(148,130,255,.38);
  --t-hi:#F5F2FF; --t-mid:#A89DC8; --t-lo:#635E8A;
  --uv:#5F4B8B; --uv-bright:#9480E0; --uv-neon:#B4A4FF; --uv-glow:rgba(95,75,139,.45);
  --uv-grad:linear-gradient(135deg,#5F4B8B 0%,#7D52C4 55%,#A070D8 100%);
  --success:#1ED760; --success-dark:#0D7A34;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-f:9999px;
  --ease-spring:cubic-bezier(.34,1.56,.64,1); --ease-std:cubic-bezier(.2,0,0,1);
  --t1:150ms; --t2:260ms; --t3:420ms;
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-tap-highlight-color:transparent;
  color-scheme:dark;
}

/* ── Reset ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{min-height:100%;background:var(--bg);color:var(--t-hi);padding-bottom:calc(44px + env(safe-area-inset-bottom))}
button{border:none;background:none;cursor:pointer;font:inherit;color:inherit}
input{border:none;background:none;outline:none;font:inherit;color:inherit}
img{display:block}
ul{list-style:none}
::-webkit-scrollbar{width:0;height:0}

/* ── Cosmic Background ───────────────────────────────────── */
.cosmic-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 160% 90% at 50% -10%,rgba(95,75,139,.28) 0%,transparent 58%),
    radial-gradient(ellipse 80% 50% at 90% 95%,rgba(65,45,115,.14) 0%,transparent 55%),
    radial-gradient(ellipse 55% 35% at 5% 65%,rgba(80,55,130,.09) 0%,transparent 50%);
}
.cosmic-bg::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.55) 1px,transparent 1px),
    radial-gradient(circle,rgba(200,190,255,.35) 1px,transparent 1px);
  background-size:180px 180px,90px 90px;
  background-position:0 0,45px 45px;
  opacity:.18;
}

/* ── Header ──────────────────────────────────────────────── */
.header-wrap{
  position:sticky;top:0;z-index:300;
  padding:calc(14px + env(safe-area-inset-top)) 20px 14px;
  background:rgba(7,7,26,.78);
  backdrop-filter:blur(30px) saturate(180%);
  border-bottom:1px solid transparent;
  transition:border-color var(--t1),background var(--t2);
}
.header-wrap.scrolled{
  background:rgba(7,7,26,.94);
  border-bottom:1px solid var(--border-dim);
}

/* 로고 절대 배치 + 텍스트 진짜 센터 */
.header-brand{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  height:40px;
  margin-bottom:14px;
  cursor:pointer;
  user-select:none;-webkit-user-select:none;
}
.header-brand:active{opacity:.7}

.header-logo{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:9px;object-fit:cover;
  box-shadow:
    0 0 0 1px rgba(148,130,255,.22),
    0 0 12px rgba(95,75,139,.50),
    0 0 26px rgba(95,75,139,.16);
}

.header-text{display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none}

/* ★ 핵심 수정: display:inline-block + padding-right 으로 italic ? 잘림 방지 */
.header-title{
  display:inline-block;              /* padding 적용 위해 필수 */
  padding-right:6px;                 /* 이탤릭 끝 문자 클리핑 방지 */
  font-size:18px;font-weight:800;font-style:italic;
  letter-spacing:-.3px;line-height:1.1;
  background:linear-gradient(95deg,#F5F2FF 0%,var(--uv-neon) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.header-sub{font-size:11px;font-weight:500;color:var(--t-lo);letter-spacing:.3px}

/* ── Search Bar ───────────────────────────────────────────── */
.search-bar{
  display:flex;align-items:center;gap:10px;height:46px;
  background:var(--surf-3);border-radius:var(--r-lg);padding:0 14px;
  border:1px solid var(--border-dim);
  transition:background var(--t1),border-color var(--t2),box-shadow var(--t2);
}
.search-bar:focus-within{
  background:var(--surf-input);border-color:var(--uv-bright);
  box-shadow:0 0 0 3px rgba(148,128,224,.10),0 0 22px rgba(95,75,139,.18);
}
.search-icon{flex-shrink:0;color:var(--t-lo);transition:color var(--t2)}
.search-bar:focus-within .search-icon{color:var(--uv-neon)}
#searchInput{
  flex:1;height:100%;font-size:15px;font-weight:500;color:var(--t-hi);
  caret-color:var(--uv-neon);
}
#searchInput::placeholder{color:var(--t-lo)}
.clear-btn{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--t-lo);background:rgba(255,255,255,.06);
  opacity:0;pointer-events:none;transition:opacity var(--t1),background var(--t1);
}
.clear-btn.visible{opacity:1;pointer-events:auto}
.clear-btn:hover{background:rgba(255,255,255,.12);color:var(--t-hi)}

/* ── Home State ───────────────────────────────────────────── */
#homeState{
  display:flex;flex-direction:column;align-items:center;
  padding:48px 24px 40px;gap:0;position:relative;z-index:1;
}
.home-logo-wrap{position:relative;margin-bottom:28px}
.home-logo{
  width:108px;height:108px;border-radius:22px;object-fit:cover;
  box-shadow:
    0 0 0 1px rgba(148,130,255,.18),
    0 0 28px rgba(95,75,139,.45),
    0 0 60px rgba(95,75,139,.22),
    0 4px 24px rgba(0,0,0,.55);
}
.home-logo-glow{
  position:absolute;inset:-20px;border-radius:40px;
  background:radial-gradient(circle,rgba(95,75,139,.30) 0%,transparent 70%);
  pointer-events:none;animation:pulseGlow 3.5s ease-in-out infinite;
}
@keyframes pulseGlow{0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)}}
.home-brand{font-size:28px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px;
  background:var(--uv-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:14px;color:var(--t-mid);margin-bottom:32px;letter-spacing:.2px}

/* Footer 소셜 링크 3-column 균등 배치 */
.app-footer{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  width:100%;max-width:340px;
}
.social-link{
  display:flex;align-items:center;justify-content:center;
  padding:11px 6px;border-radius:var(--r-md);
  border:1px solid var(--border-mid);
  background:rgba(148,130,255,.04);
  color:var(--t-mid);font-size:13px;font-weight:600;
  text-decoration:none;white-space:nowrap;
  transition:color var(--t2),border-color var(--t2),background var(--t2),box-shadow var(--t2);
}
.social-link:hover{
  color:var(--uv-neon);border-color:var(--border-glow);
  background:rgba(148,130,255,.10);
  box-shadow:0 0 16px rgba(148,128,224,.18);
}

/* ── Loader ───────────────────────────────────────────────── */
#loader{display:none;justify-content:center;padding:60px 0;position:relative;z-index:1}
#loader.visible{display:flex}
.loader-ring{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border-mid);
  border-top-color:var(--uv-bright);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Results Section ─────────────────────────────────────── */
#resultsSection{display:none;position:relative;z-index:1;padding:0 16px}
#resultsSection.visible{display:block}
.results-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 14px;gap:8px;
}
.results-count{font-size:13px;font-weight:600;color:var(--t-mid)}
.results-count span{color:var(--uv-neon);font-weight:700}
#trackList{display:flex;flex-direction:column;gap:2px}

/* ── Track Item ───────────────────────────────────────────── */
.track-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;border-radius:var(--r-md);
  background:transparent;cursor:pointer;
  border:1px solid transparent;
  transition:background var(--t1),border-color var(--t1),transform var(--t1);
  animation:fadeUp var(--t3) var(--ease-spring) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none}}
.track-item:hover{background:var(--surf-2);border-color:var(--border-dim)}
.track-item:active{transform:scale(.98)}
.track-item.selected{background:var(--surf-3);border-color:var(--border-mid)}

.track-thumb{
  width:48px;height:48px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;
  background:var(--surf-3);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.track-info{flex:1;min-width:0}
.track-title{
  font-size:16px;font-weight:600;color:var(--t-hi);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;
}
.track-sub{
  font-size:14px;color:var(--t-mid);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.preview-btn{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(148,130,255,.08);border:1px solid var(--border-dim);
  color:var(--t-mid);
  transition:background var(--t1),color var(--t1),border-color var(--t1),transform var(--t1);
}
.preview-btn:hover{background:rgba(148,130,255,.18);color:var(--uv-neon);border-color:var(--border-mid)}
.preview-btn.playing{background:rgba(148,130,255,.22);color:var(--uv-neon);border-color:var(--border-glow);
  animation:breathe 1.4s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(148,130,255,.0)} 50%{box-shadow:0 0 0 5px rgba(148,130,255,.18)}}

/* ── Inline Request Panel ─────────────────────────────────── */
.panel-wrap{
  overflow:hidden;max-height:0;
  transition:max-height var(--t3) var(--ease-std),opacity var(--t2);
  opacity:0;
}
.panel-wrap.open{max-height:260px;opacity:1}
.panel{
  margin:4px 0 8px;padding:14px;border-radius:var(--r-md);
  background:var(--surf-1);border:1px solid var(--border-mid);
}
.nick-label{font-size:12px;font-weight:600;color:var(--t-lo);margin-bottom:6px;letter-spacing:.3px}
.nick-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surf-input);border-radius:var(--r-sm);
  padding:0 12px;height:42px;margin-bottom:12px;
  border:1px solid var(--border-dim);
  transition:border-color var(--t2),box-shadow var(--t2);
}
.nick-input-wrap:focus-within{border-color:var(--uv-bright);box-shadow:0 0 0 3px rgba(148,128,224,.10)}
.nick-input-wrap input{flex:1;font-size:15px;color:var(--t-hi)}
.nick-input-wrap input::placeholder{color:var(--t-lo)}
.char-count{font-size:11px;color:var(--t-lo);flex-shrink:0}
.panel-actions{display:flex;gap:8px}
.submit-btn{
  flex:1;height:42px;border-radius:var(--r-sm);font-size:14px;font-weight:700;
  background:var(--uv-grad);color:#fff;letter-spacing:.2px;
  position:relative;overflow:hidden;
  transition:opacity var(--t1),box-shadow var(--t2),transform var(--t1);
  box-shadow:0 0 20px rgba(95,75,139,.35);
}
.submit-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background var(--t1)}
.submit-btn:hover::after{background:rgba(255,255,255,.06)}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.45;pointer-events:none}
.submit-btn .check-icon{display:none;color:#fff}
.submit-btn.success-state{background:linear-gradient(135deg,var(--success-dark),var(--success));box-shadow:0 0 20px rgba(30,215,96,.30)}
.cancel-btn{
  width:42px;height:42px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);color:var(--t-mid);
  border:1px solid var(--border-dim);
  transition:background var(--t1),color var(--t1);
}
.cancel-btn:hover{background:rgba(255,100,100,.10);color:#FF6B6B}

/* ── Toast ───────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surf-3);color:var(--t-hi);
  border:1px solid var(--border-mid);border-radius:var(--r-f);
  padding:12px 20px;font-size:14px;font-weight:500;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity var(--t2),transform var(--t2);
  white-space:nowrap;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Media Query ─────────────────────────────────────────── */
@media(min-width:600px){
  .header-wrap,
  .results-header,
  #trackList,
  #homeState{max-width:600px;margin-left:auto;margin-right:auto}
  .header-wrap{padding-left:0;padding-right:0}
  #resultsSection{padding:0}
}

/* ── Shake animation ─────────────────────────────────────── */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake{animation:shake .35s var(--ease-std)}
</style>
</head>
<body>

<div class="cosmic-bg" aria-hidden="true"></div>

<!-- ── Header ──────────────────────────────────────────── -->
<header class="header-wrap" id="headerWrap">
  <div class="header-brand" id="headerHomeLink" role="button" tabindex="0" aria-label="메인으로 가기">
    <img class="header-logo" src="https://miwig-songs.github.io/request/thumb.jpg" alt="로고">
    <div class="header-text">
      <span class="header-title">Any Requests?</span>
      <span class="header-sub">미위구 스트리밍 신청곡 페이지</span>
    </div>
  </div>
  <div class="search-bar" role="search">
    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" type="search" inputmode="search" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="곡 제목 또는 아티스트 검색" aria-label="곡 검색">
    <button class="clear-btn" id="clearBtn" aria-label="검색어 지우기">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── Home State ──────────────────────────────────────── -->
<section id="homeState" aria-live="polite">
  <div class="home-logo-wrap">
    <div class="home-logo-glow" aria-hidden="true"></div>
    <img class="home-logo" src="https://miwig-songs.github.io/request/main_image.jpg" alt="미위구">
  </div>
  <p class="home-brand">midnightwithgroove</p>
  <p class="home-sub">신청곡을 검색해서 보내주세요 🎵</p>
  <footer class="app-footer">
    <a href="https://www.youtube.com/@midnightwithgroove" target="_blank" rel="noopener" class="social-link" aria-label="유튜브">YouTube</a>
    <a href="http://instagram.com/midnightwithgroove" target="_blank" rel="noopener" class="social-link" aria-label="인스타그램">Instagram</a>
    <a href="https://chzzk.naver.com/d17bed9f876d6a17be54e4f23c3c30d2" target="_blank" rel="noopener" class="social-link" aria-label="치지직">Chzzk</a>
  </footer>
</section>

<!-- ── Loader ──────────────────────────────────────────── -->
<div id="loader" role="status" aria-label="검색 중">
  <div class="loader-ring"></div>
</div>

<!-- ── Results ─────────────────────────────────────────── -->
<section id="resultsSection" aria-label="검색 결과">
  <div class="results-header">
    <p class="results-count" id="resultsCount"><span id="resultsNum">0</span>곡</p>
  </div>
  <ul id="trackList" role="list"></ul>
</section>

<!-- ── Toast ───────────────────────────────────────────── -->
<div id="toast" role="alert" aria-live="assertive"></div>

<script>
/* ════════════════════════════════════════════════════
   ★ GAS URL — 여기에 웹앱 URL을 입력하세요
   ════════════════════════════════════════════════════ */
const GAS_URL = '여기에_웹앱_URL_넣기';

/* ─── Main App ────────────────────────────────────── */
(function () {
  'use strict';

  /* ── DOM refs ── */
  const headerWrap    = document.getElementById('headerWrap');
  const headerHomeLink= document.getElementById('headerHomeLink');
  const searchInput   = document.getElementById('searchInput');
  const clearBtn      = document.getElementById('clearBtn');
  const homeState     = document.getElementById('homeState');
  const loader        = document.getElementById('loader');
  const resultsSection= document.getElementById('resultsSection');
  const resultsNum    = document.getElementById('resultsNum');
  const trackList     = document.getElementById('trackList');
  const toastEl       = document.getElementById('toast');

  /* ── State ── */
  let currentAudio    = null;
  let currentPlayBtn  = null;
  let searchTimer     = null;
  let allTracks       = [];
  let renderedCount   = 0;
  let activePanel     = null;
  const CHUNK         = 20;
  const NICK_KEY      = 'mwg_nickname';

  /* ── Scroll → header border ── */
  window.addEventListener('scroll', () => {
    headerWrap.classList.toggle('scrolled', window.scrollY > 2);
  }, { passive: true });

  /* ── Home link ── */
  function goHome() {
    stopAudio();
    closeActivePanel();
    searchInput.value = '';
    clearBtn.classList.remove('visible');
    showHome();
  }
  headerHomeLink.addEventListener('click', goHome);
  headerHomeLink.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') goHome(); });

  /* ── Search input ── */
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    clearTimeout(searchTimer);
    if (!q) { showHome(); return; }
    searchTimer = setTimeout(() => doSearch(q), 420);
  });
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.classList.remove('visible');
    searchInput.focus();
    showHome();
  });

  /* ── UI state helpers ── */
  function showHome() {
    homeState.style.display      = '';
    loader.classList.remove('visible');
    resultsSection.classList.remove('visible');
    allTracks = []; renderedCount = 0;
  }
  function showLoader() {
    homeState.style.display = 'none';
    loader.classList.add('visible');
    resultsSection.classList.remove('visible');
  }
  function showResults() {
    loader.classList.remove('visible');
    resultsSection.classList.add('visible');
  }

  /* ── iTunes search ── */
  function doSearch(q) {
    stopAudio(); closeActivePanel();
    showLoader();
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=50&callback=${cb}`;
    window[cb] = data => {
      delete window[cb]; script.remove();
      allTracks = data.results || [];
      renderedCount = 0;
      trackList.innerHTML = '';
      resultsNum.textContent = allTracks.length;
      showResults();
      renderChunk();
    };
    script.onerror = () => { delete window[cb]; script.remove(); showHome(); toast('검색 중 오류가 발생했습니다.'); };
    document.head.appendChild(script);
  }

  /* ── Render ── */
  function renderChunk() {
    const end = Math.min(renderedCount + CHUNK, allTracks.length);
    const frag = document.createDocumentFragment();
    for (let i = renderedCount; i < end; i++) frag.appendChild(makeItem(allTracks[i], i));
    trackList.appendChild(frag);
    renderedCount = end;
  }

  function makeItem(track, idx) {
    const li = document.createElement('li');
    li.className = 'track-item';
    li.style.animationDelay = ((idx % CHUNK) * 30) + 'ms';
    li.setAttribute('role', 'listitem');

    const thumb = document.createElement('img');
    thumb.className = 'track-thumb';
    thumb.src  = (track.artworkUrl100 || '').replace('100x100', '60x60');
    thumb.alt  = track.trackName || '';
    thumb.loading = 'lazy';

    const info = document.createElement('div');
    info.className = 'track-info';
    const title = document.createElement('p'); title.className = 'track-title'; title.textContent = track.trackName  || '제목 없음';
    const sub   = document.createElement('p'); sub.className   = 'track-sub';   sub.textContent   = track.artistName || '';
    info.append(title, sub);

    const playBtn = document.createElement('button');
    playBtn.className = 'preview-btn';
    playBtn.setAttribute('aria-label', '미리듣기');
    playBtn.innerHTML = playIconSVG();

    const panelWrap = document.createElement('div');
    panelWrap.className = 'panel-wrap';
    panelWrap.appendChild(makePanel(track, li, panelWrap));

    playBtn.addEventListener('click', e => { e.stopPropagation(); togglePreview(track.previewUrl, playBtn); });
    li.addEventListener('click', () => togglePanel(li, panelWrap));
    li.append(thumb, info, playBtn);

    const wrapper = document.createElement('div');
    wrapper.append(li, panelWrap);
    return wrapper;
  }

  function makePanel(track, li, panelWrap) {
    const panel = document.createElement('div');
    panel.className = 'panel';

    const label = document.createElement('p');
    label.className = 'nick-label';
    label.textContent = '닉네임';

    const inputWrap = document.createElement('div');
    inputWrap.className = 'nick-input-wrap';
    const nickInput = document.createElement('input');
    nickInput.type = 'text'; nickInput.maxLength = 20; nickInput.placeholder = '닉네임을 입력하세요';
    nickInput.value = localStorage.getItem(NICK_KEY) || '';
    const charCount = document.createElement('span');
    charCount.className = 'char-count';
    charCount.textContent = `${nickInput.value.length}/20`;
    nickInput.addEventListener('input', () => { charCount.textContent = `${nickInput.value.length}/20`; });
    inputWrap.append(nickInput, charCount);

    const actions = document.createElement('div');
    actions.className = 'panel-actions';

    const submitBtn = document.createElement('button');
    submitBtn.className = 'submit-btn';
    submitBtn.setAttribute('aria-label', '신청');
    submitBtn.innerHTML = `<span class="btn-text">신청하기</span><span class="check-icon" aria-hidden="true"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>`;

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'cancel-btn';
    cancelBtn.setAttribute('aria-label', '취소');
    cancelBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

    submitBtn.addEventListener('click', () => {
      const nick = nickInput.value.trim();
      if (!nick) { shake(inputWrap); nickInput.focus(); return; }
      localStorage.setItem(NICK_KEY, nick);
      send({ trackName: track.trackName, artistName: track.artistName, artworkUrl: track.artworkUrl100, nickname: nick }, li, submitBtn);
    });
    cancelBtn.addEventListener('click', () => closePanel(li, panelWrap));

    actions.append(submitBtn, cancelBtn);
    panel.append(label, inputWrap, actions);
    return panel;
  }

  /* ── Panel toggle ── */
  function togglePanel(li, panelWrap) {
    if (panelWrap.classList.contains('open')) {
      closePanel(li, panelWrap);
    } else {
      if (activePanel) closePanel(activePanel.li, activePanel.panelWrap);
      openPanel(li, panelWrap);
    }
  }
  function openPanel(li, panelWrap) {
    li.classList.add('selected');
    panelWrap.classList.add('open');
    activePanel = { li, panelWrap };
    setTimeout(() => { const input = panelWrap.querySelector('input'); if (input) input.focus(); }, 300);
  }
  function closePanel(li, panelWrap) {
    li.classList.remove('selected');
    panelWrap.classList.remove('open');
    if (activePanel && activePanel.li === li) activePanel = null;
  }
  function closeActivePanel() {
    if (activePanel) closePanel(activePanel.li, activePanel.panelWrap);
  }

  /* ── Audio preview ── */
  function togglePreview(url, btn) {
    if (!url) { toast('미리듣기를 지원하지 않는 곡입니다.'); return; }
    if (currentAudio && !currentAudio.paused) {
      if (currentPlayBtn === btn) { stopAudio(); return; }
      stopAudio();
    }
    currentAudio = new Audio(url);
    currentAudio.volume = 0.6;
    currentAudio.play().catch(() => toast('재생할 수 없습니다.'));
    currentAudio.addEventListener('ended', () => { btn.classList.remove('playing'); btn.innerHTML = playIconSVG(); currentAudio = null; currentPlayBtn = null; });
    btn.classList.add('playing');
    btn.innerHTML = stopIconSVG();
    currentPlayBtn = btn;
  }
  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (currentPlayBtn) { currentPlayBtn.classList.remove('playing'); currentPlayBtn.innerHTML = playIconSVG(); currentPlayBtn = null; }
  }

  /* ── Send request ── */
  function send(payload, li, btn) {
    btn.disabled = true;
    const txt = btn.querySelector('.btn-text');
    const chk = btn.querySelector('.check-icon');
    if (txt) txt.textContent = '전송 중…';

    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => triggerSuccess(li, btn, chk, txt))
    .catch(() => {
      btn.disabled = false;
      if (txt) txt.textContent = '신청하기';
      toast('전송 중 오류가 발생했습니다.');
    });
  }

  function triggerSuccess(li, btn, chk, txt) {
    btn.classList.add('success-state');
    if (txt) txt.style.display = 'none';
    if (chk) chk.style.display = 'inline-flex';
    toast('🎵 신청이 완료되었습니다!');
    setTimeout(() => onDone(li, btn, chk, txt), 1600);
  }

  function onDone(li, btn, chk, txt) {
    btn.classList.remove('success-state');
    btn.disabled = false;
    if (txt) { txt.style.display = ''; txt.textContent = '신청하기'; }
    if (chk) chk.style.display = 'none';
    closeActivePanel();
  }

  /* ── Infinite scroll ── */
  window.addEventListener('scroll', () => {
    if (renderedCount >= allTracks.length) return;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) renderChunk();
  }, { passive: true });

  /* ── Toast ── */
  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  /* ── Shake ── */
  function shake(el) {
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
    el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  }

  /* ── SVG helpers ── */
  function playIconSVG() {
    return `<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  }
  function stopIconSVG() {
    return `<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  }

  /* ── Init ── */
  showHome();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Midnight With Groove — 신청곡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;500;700&display=swap" rel="stylesheet">
<style>

/* ════════════════════════════════════════
   Tokens
════════════════════════════════════════ */
:root {
  --bg:          #0C0B0F;
  --surf-1:      #131215;   
  --surf-2:      #1A1820;   
  --surf-3:      #22202A;   
  --surf-4:      #2C2A34;   
  --border-dim:  rgba(255,255,255,0.06);
  --border-sub:  rgba(255,255,255,0.10);

  --t-hi:   #F0ECF4;   
  --t-mid:  #B8B4C0;   
  --t-lo:   #6B6875;   

  --uv:         #5F4B8B;   
  --uv-light:   #D0BCFF;   
  --uv-dim:     rgba(208,188,255,0.08);   

  --success:    #5DB97C;
  --success-bg: rgba(93,185,124,0.12);

  --r-sm:   8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  24px;
  --r-f:   9999px;

  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-std:      cubic-bezier(0.2,  0,    0,    1);
  --t1: 120ms;
  --t2: 220ms;
  --t3: 380ms;

  font-family: 'Google Sans', system-ui, sans-serif;
  -webkit-tap-highlight-color: transparent;
  color-scheme: dark;
}

/* ════════════════════════════════════════
   Reset
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--t-hi);
  overscroll-behavior: none;
  padding-bottom: calc(120px + env(safe-area-inset-bottom));
}
button { border: none; background: none; cursor: pointer; font: inherit; color: inherit; }
input  { border: none; background: none; outline: none; font: inherit; color: inherit; }
img    { display: block; }
ul     { list-style: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ════════════════════════════════════════
   Top Bar
════════════════════════════════════════ */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px calc(14px + env(safe-area-inset-top));
  padding-top: calc(14px + env(safe-area-inset-top));
  background: rgba(12,11,15,0.85);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border-bottom: 1px solid var(--border-dim);
}
.top-bar__title {
  font-family: 'Google Sans Display', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--t-hi);
  letter-spacing: -0.3px;
}
.top-bar__logo {
  height: 18px; /* 로고 18px */
  width: auto;
  border-radius: 5px;
  opacity: 0.85;
  filter: brightness(0.95);
}

/* ════════════════════════════════════════
   Search Bar (Floating Bottom)
════════════════════════════════════════ */
.search-wrap {
  position: fixed;
  left: 0;
  right: 0;
  bottom: calc(16px + env(safe-area-inset-bottom));
  z-index: 300;
  padding: 0 16px;
  opacity: 1;
  transition: opacity var(--t2) var(--ease-std);
}

/* 닉네임 입력 중 사파리 키보드 올라올 때 플로팅 검색창 가리기 */
body.nick-focused .search-wrap { display: none !important; }

.search-wrap:focus-within { opacity: 1 !important; }

.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 56px;
  background: rgba(34,32,42,0.78);
  border-radius: var(--r-f);
  padding: 0 18px;
  border: 1px solid var(--border-dim);
  box-shadow: 0 10px 34px rgba(0,0,0,0.55);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  transition: border-color var(--t1) var(--ease-std), background var(--t1) var(--ease-std), box-shadow var(--t2) var(--ease-spring);
}
.search-bar:focus-within {
  border-color: var(--uv);
  background: rgba(44,42,52,0.82);
  box-shadow: 0 10px 34px rgba(0,0,0,0.55), 0 0 0 2px rgba(95,75,139,0.45);
}
.search-bar__icon {
  flex-shrink: 0; width: 20px; height: 20px; color: var(--t-lo);
  transition: color var(--t1) var(--ease-std);
}
.search-bar:focus-within .search-bar__icon { color: var(--uv); }

.search-bar__input {
  flex: 1;
  font-size: 17px; /* 검색 텍스트 17px */
  color: var(--t-hi);
  caret-color: var(--uv);
}
.search-bar__input::placeholder { color: var(--t-lo); }
.search-bar__clear {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--r-f);
  display: flex; align-items: center; justify-content: center;
  color: var(--t-lo); opacity: 0; pointer-events: none;
  transition: opacity var(--t1) var(--ease-std), background var(--t1) var(--ease-std);
}
.search-bar__clear.visible { opacity: 1; pointer-events: auto; }
.search-bar__clear:hover  { background: rgba(255,255,255,0.07); }
.search-bar__clear:active { background: rgba(255,255,255,0.12); }

/* ════════════════════════════════════════
   Home State
════════════════════════════════════════ */
#homeState {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 55vh; padding: 52px 24px; gap: 12px; text-align: center;
}
.home-logo {
  width: 88px; height: 88px; border-radius: var(--r-xl); object-fit: cover;
  margin-bottom: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.55);
}
.home-brand { font-family: 'Google Sans Display', sans-serif; font-size: 26px; font-weight: 700; color: var(--t-hi); letter-spacing: -0.4px; }
.home-sub { font-size: 14px; color: var(--t-mid); line-height: 1.65; max-width: 260px; margin-top: 2px; }
.home-hint-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
.hint-chip {
  height: 34px; padding: 0 14px; border-radius: var(--r-f); background: var(--surf-2);
  border: 1px solid var(--border-sub); font-size: 13px; font-weight: 500; color: var(--t-mid);
  cursor: pointer; transition: background var(--t1), color var(--t1), transform var(--t1) var(--ease-spring);
}
.hint-chip:hover  { background: var(--surf-3); color: var(--t-hi); border-color: rgba(255,255,255,0.16); }
.hint-chip:active { transform: scale(0.94); }

/* ════════════════════════════════════════
   Loader
════════════════════════════════════════ */
#loader { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 56px 24px; color: var(--t-lo); font-size: 13px; }
#loader.active { display: flex; }
.loader-ring { width: 36px; height: 36px; border: 2.5px solid rgba(255,255,255,0.08); border-top-color: var(--uv-light); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════
   Results Section
════════════════════════════════════════ */
#resultsSection { display: none; }
#resultsSection.active { display: block; }

.results-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 6px; }
/* 결과 텍스트 원래 사이즈 롤백 */
.results-label { font-size: 11px; font-weight: 600; color: var(--t-lo); letter-spacing: 1px; text-transform: uppercase; }
.results-count { font-size: 11px; color: var(--t-lo); }

/* ════════════════════════════════════════
   Track List
════════════════════════════════════════ */
#trackList { padding: 0 12px 24px; }

.track-item { border-radius: var(--r-lg); overflow: hidden; margin-bottom: 2px; transition: opacity var(--t2) var(--ease-std); animation: fadeUp var(--t3) var(--ease-spring) both; }
.track-item:nth-child(odd)  { animation-delay: 20ms; }
.track-item:nth-child(even) { animation-delay: 50ms; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

body.has-selection .track-item:not(.selected) { opacity: 0.28; pointer-events: none; }

.track-row { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: var(--surf-1); cursor: pointer; min-height: 70px; transition: background var(--t1) var(--ease-std); user-select: none; }
.track-row:hover  { background: var(--surf-2); }
.track-row:active { background: var(--surf-3); }
.track-item.selected .track-row { background: var(--surf-2); }
.track-item.done .track-row { cursor: default; }

/* ── Thumbnail & Audio Preview ── */
.thumb-wrap {
  position: relative;
  width: 52px; height: 52px;
  flex-shrink: 0;
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--surf-3);
  cursor: pointer;
}
.track-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform var(--t2) var(--ease-spring); }
.track-item.selected .track-thumb { box-shadow: 0 0 0 2px var(--uv); transform: scale(1.05); }
.track-item.done .track-thumb { opacity: 0.45; filter: grayscale(1); }

/* Play/Pause Overlay */
.play-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--t1) var(--ease-std);
}
.thumb-wrap:hover .play-overlay { opacity: 1; }
.thumb-wrap.playing .play-overlay { opacity: 1; background: rgba(0,0,0,0.7); }
.icon-play, .icon-pause { color: #fff; width: 24px; height: 24px; }
.icon-pause { display: none; }
.thumb-wrap.playing .icon-play { display: none; }
.thumb-wrap.playing .icon-pause { display: block; }

/* ── Text ── */
.track-info { flex: 1; min-width: 0; }
.track-title { font-size: 17px; font-weight: 500; color: var(--t-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; transition: color var(--t1); }
.track-item.done .track-title { text-decoration: line-through; color: var(--t-lo); }
.track-sub { font-size: 15px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }

/* ── Trailing ── */
.track-trail { flex-shrink: 0; display: flex; align-items: center; justify-content: center; min-width: 20px; }
.trail-icon { color: var(--t-lo); transition: transform var(--t2) var(--ease-spring), color var(--t1); }
.track-item.selected .trail-icon { transform: rotate(90deg); color: var(--t-mid); }
.done-badge { display: none; font-size: 11px; font-weight: 600; color: var(--success); background: var(--success-bg); border-radius: var(--r-f); padding: 3px 9px; white-space: nowrap; }
.track-item.done .done-badge { display: inline-flex; }
.track-item.done .trail-icon { display: none; }

/* ════════════════════════════════════════
   Inline Panel
════════════════════════════════════════ */
.panel-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--t3) var(--ease-spring); }
.track-item.selected .panel-wrap { grid-template-rows: 1fr; }
.panel-inner { overflow: hidden; }

.panel { background: var(--surf-2); border-top: 1px solid rgba(95,75,139,0.6); padding: 14px 16px 14px; display: flex; flex-direction: column; gap: 10px; }
.nick-label { font-size: 11px; font-weight: 600; color: var(--t-lo); letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 8px; }
.nick-wrap { display: flex; align-items: center; background: var(--surf-3); border-radius: var(--r-md); border: 1px solid var(--border-sub); padding: 0 14px; height: 50px; transition: border-color var(--t1), box-shadow var(--t2), background var(--t1); }
.nick-wrap:focus-within { border-color: var(--uv); box-shadow: 0 0 0 2px rgba(95,75,139,0.4); background: var(--surf-4); }
/* iOS 사파리 자동 확대(Zoom) 방지를 위한 최소 16px 적용 */
.nick-input { flex: 1; font-size: 16px; color: var(--t-hi); caret-color: var(--uv); }
.nick-input::placeholder { color: var(--t-lo); }
.nick-counter { font-size: 12px; color: var(--t-lo); margin-left: 10px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.nick-counter.near { color: #c49a3c; }

.submit-btn { width: 100%; height: 54px; border-radius: var(--r-f); background: var(--uv); color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.2px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 2px 20px rgba(95,75,139,0.45); transition: transform var(--t1), box-shadow var(--t2), filter var(--t1); }
.submit-btn::after { content: ''; position: absolute; inset: 0; border-radius: inherit; background: #000; opacity: 0; transition: opacity var(--t1); }
.submit-btn:hover::after  { opacity: 0.06; }
.submit-btn:active::after { opacity: 0.12; }
.submit-btn:active { transform: scale(0.975); }
.submit-btn:disabled { background: var(--surf-3); color: var(--t-lo); box-shadow: none; cursor: not-allowed; }
.submit-btn.loading { pointer-events: none; }
.submit-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
.submit-btn.loading .submit-spinner { display: block; }
.submit-btn.loading .submit-text    { display: none; }

.cancel-btn { width: 100%; height: 28px; border-radius: var(--r-f); font-size: 12px; font-weight: 500; color: var(--t-lo); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color var(--t1), background var(--t1); }
.cancel-btn:hover  { color: var(--t-mid); background: rgba(255,255,255,0.04); }
.cancel-btn:active { background: rgba(255,255,255,0.08); }

.list-divider { height: 1px; background: var(--border-dim); margin: 0 14px; }

/* ════════════════════════════════════════
   Toast
════════════════════════════════════════ */
#toast {
  position: fixed; bottom: calc(90px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(10px);
  z-index: 999; background: var(--surf-4); color: var(--t-hi);
  border-radius: var(--r-lg); padding: 13px 20px; font-size: 14px; font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6); border: 1px solid var(--border-sub);
  opacity: 0; pointer-events: none; transition: opacity var(--t2), transform var(--t2);
  white-space: nowrap; max-width: calc(100vw - 40px); text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

input[type=search]::-webkit-search-cancel-button { display: none; }
@media (min-width: 600px) {
  #trackList  { max-width: 560px; margin: 0 auto; }
  .search-wrap { padding: 0 20px; }
  #homeState  { padding: 64px 32px; }
}
</style>
</head>
<body>

<header class="top-bar">
  <span class="top-bar__title">검색</span>
  <img class="top-bar__logo" src="https://miwig-songs.github.io/request/logo.jpg" alt="Midnight With Groove" loading="eager">
</header>

<div class="search-wrap" id="searchWrap">
  <div class="search-bar" role="search">
    <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" class="search-bar__input" type="search" placeholder="아티스트, 노래, 가사 등" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="search" aria-label="음악 검색">
    <button id="clearBtn" class="search-bar__clear" aria-label="검색어 지우기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>
</div>

<section id="homeState" aria-live="polite">
  <img class="home-logo" src="https://miwig-songs.github.io/request/logo.jpg" alt="" aria-hidden="true">
  <h1 class="home-brand">Midnight With Groove</h1>
  <p class="home-sub">듣고 싶은 곡을 검색해서<br>DJ에게 신청하세요</p>
  <div class="home-hint-row">
    <button class="hint-chip" data-query="Bruno Mars">Bruno Mars</button>
    <button class="hint-chip" data-query="Frank Ocean">Frank Ocean</button>
    <button class="hint-chip" data-query="NewJeans">NewJeans</button>
    <button class="hint-chip" data-query="The Weeknd">The Weeknd</button>
  </div>
</section>

<div id="loader" role="status" aria-label="검색 중">
  <div class="loader-ring"></div>
  <span>검색 중</span>
</div>

<section id="resultsSection" aria-label="검색 결과">
  <div class="results-header">
    <span class="results-label">검색 결과</span>
    <span class="results-count" id="resultsCount"></span>
  </div>
  <ul id="trackList" role="list"></ul>
  <div id="scrollSentinel" style="height: 10px; margin-top: 20px;"></div>
</section>

<div id="toast" role="alert" aria-live="assertive"></div>

<script>
(function() {
  if (window._mWG_initialized) return;
  window._mWG_initialized = true;

  const GAS_URL = '여기에_웹앱_URL_넣기';

  let debTimer      = null;
  let selItem       = null;
  let selTrack      = null;

  // 오디오 관리 변수
  let currentAudio  = null;
  let currentThumb  = null;

  // 인피니트 스크롤 관련 변수
  let allResults = [];
  let renderCount = 0;
  const CHUNK_SIZE = 50;

  const $searchWrap = document.getElementById('searchWrap');
  const $search  = document.getElementById('searchInput');
  const $clear   = document.getElementById('clearBtn');
  const $home    = document.getElementById('homeState');
  const $loader  = document.getElementById('loader');
  const $results = document.getElementById('resultsSection');
  const $list    = document.getElementById('trackList');
  const $count   = document.getElementById('resultsCount');
  const $toast   = document.getElementById('toast');

  /* 하단 스크롤시 opacity 조절 */
  let lastScrollY = window.scrollY;
  let isScrolling = false;
  window.addEventListener('scroll', () => {
    if (!isScrolling) {
      window.requestAnimationFrame(() => {
        const currentScrollY = window.scrollY;
        if (currentScrollY > 50 && currentScrollY > lastScrollY) {
          $searchWrap.style.opacity = '0.3';
        } else {
          $searchWrap.style.opacity = '1';
        }
        lastScrollY = currentScrollY;
        isScrolling = false;
      });
      isScrolling = true;
    }
  }, { passive: true });

  function stopAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    if (currentThumb) {
      currentThumb.classList.remove('playing');
      currentThumb = null;
    }
  }

  /* ── Search (최대 200곡 가져오기) ── */
  function doSearch(q) {
    q = q.trim();
    if (!q) { showHome(); return; }
    showLoader();
    stopAudio();
    
    const oldScript = document.getElementById('itunes-jsonp');
    if (oldScript) oldScript.remove();

    const s = document.createElement('script');
    s.id = 'itunes-jsonp';
    s.src = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&country=KR&limit=200&callback=_itcb`;
    s.onerror = () => { showHome(); toast('검색 중 오류가 발생했습니다'); };
    document.head.appendChild(s);
  }

  window._itcb = function(data) {
    const s = document.getElementById('itunes-jsonp');
    if (s) s.remove();
    
    allResults = (data && data.results) || [];
    renderCount = 0;
    resetSel();
    $list.innerHTML = '';
    
    if (allResults.length) {
      $count.textContent = `${allResults.length}곡`;
      loadMore();
      hideAllStates();
      $results.classList.add('active');
    } else {
      showEmpty();
    }
  };

  /* ── Chunk Render (50곡씩) ── */
  function loadMore() {
    const chunk = allResults.slice(renderCount, renderCount + CHUNK_SIZE);
    if (!chunk.length) return;
    renderList(chunk, renderCount);
    renderCount += chunk.length;
  }

  // 무한 스크롤 옵저버 설정
  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && renderCount < allResults.length) {
      loadMore();
    }
  }, { rootMargin: '200px' });
  observer.observe(document.getElementById('scrollSentinel'));

  function renderList(tracks, offsetIndex) {
    tracks.forEach((t, i) => {
      const thumb   = (t.artworkUrl100 || '').replace('100x100', '300x300');
      const song    = t.trackName      || '알 수 없음';
      const artist  = t.artistName     || '';
      const album   = t.collectionName || '';
      const preview = t.previewUrl     || '';
      const ytLink  = `https://music.youtube.com/search?q=${encodeURIComponent(artist + ' ' + song)}`;
      const tdata   = { song, artist, album, thumb, link: ytLink, previewUrl: preview };

      const li = document.createElement('li');
      li.className = 'track-item';

      li.innerHTML = `
        <div class="track-row" tabindex="0" role="button" aria-expanded="false">
          <div class="thumb-wrap" tabindex="0" role="button" aria-label="미리듣기">
            <img class="track-thumb" src="${thumb}" alt="" loading="lazy">
            <div class="play-overlay">
              <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
          </div>
          <div class="track-info">
            <div class="track-title">${esc(song)}</div>
            <div class="track-sub">${esc(artist)}${album ? ' · ' + esc(album) : ''}</div>
          </div>
          <div class="track-trail">
            <svg class="trail-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
            <span class="done-badge">완료</span>
          </div>
        </div>
        <div class="panel-wrap">
          <div class="panel-inner">
            <div class="panel">
              <div>
                <div class="nick-label">닉네임</div>
                <div class="nick-wrap">
                  <input class="nick-input" type="text" maxlength="15" placeholder="채팅 닉네임을 입력하세요" autocomplete="off">
                  <span class="nick-counter">0 / 15</span>
                </div>
              </div>
              <button class="submit-btn" type="button">
                <div class="submit-spinner" aria-hidden="true"></div>
                <span class="submit-text">신청하기</span>
              </button>
              <button class="cancel-btn" type="button">취소</button>
            </div>
          </div>
        </div>`;

      const row       = li.querySelector('.track-row');
      const thumbWrap = li.querySelector('.thumb-wrap');
      const nick      = li.querySelector('.nick-input');
      const ctr       = li.querySelector('.nick-counter');
      const sbtn      = li.querySelector('.submit-btn');
      const cbtn      = li.querySelector('.cancel-btn');

      /* 오디오 재생 컨트롤 */
      thumbWrap.addEventListener('click', (e) => {
        e.stopPropagation(); // 부모인 아코디언이 열리는 것을 방지
        e.preventDefault();

        if (!preview) { toast('미리듣기를 지원하지 않는 곡입니다.'); return; }

        if (currentAudio && currentThumb === thumbWrap) {
          if (currentAudio.paused) {
            currentAudio.play();
            thumbWrap.classList.add('playing');
          } else {
            currentAudio.pause();
            thumbWrap.classList.remove('playing');
          }
          return;
        }

        stopAudio();
        
        currentAudio = new Audio(preview);
        currentThumb = thumbWrap;
        thumbWrap.classList.add('playing');
        currentAudio.play();

        currentAudio.addEventListener('ended', () => {
          thumbWrap.classList.remove('playing');
          currentAudio = null;
        });
        currentAudio.addEventListener('error', () => {
          toast('미리듣기를 재생할 수 없습니다.');
          stopAudio();
        });
      });

      /* Select (아코디언 기능 완벽 보완) */
      function select() {
        if (li.classList.contains('done')) return;
        
        const isCurrentlySelected = li.classList.contains('selected');

        // 다른 모든 열려있는 아코디언 닫기
        document.querySelectorAll('.track-item.selected').forEach(el => {
          if (el !== li) {
            el.classList.remove('selected');
            const r = el.querySelector('.track-row');
            if (r) r.setAttribute('aria-expanded', 'false');
          }
        });

        if (isCurrentlySelected) {
          deselect(); 
          return; 
        }

        // 현재 항목 열기
        selItem  = li;
        selTrack = tdata;
        li.classList.add('selected');
        row.setAttribute('aria-expanded', 'true');
        document.body.classList.add('has-selection');
        
        // 아이폰 스크롤 어색함 방지를 위해 block: 'center' 지정
        setTimeout(() => { 
          li.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
          nick.focus(); 
        }, 320);
      }
      row.addEventListener('click', select);
      row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });

      /* 사파리 가상 키보드 UI 보호 연동 */
      nick.addEventListener('focus', () => document.body.classList.add('nick-focused'));
      nick.addEventListener('blur', () => document.body.classList.remove('nick-focused'));

      /* Counter */
      nick.addEventListener('input', () => {
        const n = nick.value.length;
        ctr.textContent = `${n} / 15`;
        ctr.classList.toggle('near', n >= 13);
      });

      /* Submit */
      sbtn.addEventListener('click', () => {
        const u = nick.value.trim();
        if (!u) { nick.focus(); shake(nick.closest('.nick-wrap')); return; }
        sbtn.classList.add('loading');
        sbtn.disabled = true;
        send({ ...selTrack, user: u }, li, sbtn);
      });

      /* Cancel */
      cbtn.addEventListener('click', () => deselect());

      /* Divider */
      if (offsetIndex + i > 0) {
        const d = document.createElement('li');
        d.className = 'list-divider';
        d.setAttribute('role', 'separator');
        $list.appendChild(d);
      }
      $list.appendChild(li);
    });
  }

  /* ── Send ───────────────────────────────── */
  async function send(payload, item, btn) {
    try {
      if (GAS_URL === '여기에_웹앱_URL_넣기') {
        await new Promise(r => setTimeout(r, 800));
        onDone(item);
        return;
      }
      const r = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      if (!r.ok) throw new Error(r.statusText);
      onDone(item);
    } catch {
      btn.classList.remove('loading');
      btn.disabled = false;
      toast('신청에 실패했습니다. 다시 시도해주세요.');
    }
  }

  function onDone(item) {
    item.classList.remove('selected');
    item.classList.add('done');
    document.body.classList.remove('has-selection');
    selItem = selTrack = null;
    toast('신청이 완료되었습니다');
  }

  function deselect() {
    if (!selItem) return;
    selItem.classList.remove('selected');
    selItem.querySelector('.track-row').setAttribute('aria-expanded', 'false');
    document.body.classList.remove('has-selection');
    selItem = selTrack = null;
  }

  function resetSel() {
    document.body.classList.remove('has-selection');
    selItem = selTrack = null;
  }

  /* ── UI States ──────────────────────────── */
  function hideAllStates() {
    $home.style.display    = 'none';
    $loader.classList.remove('active');
    $results.classList.remove('active');
  }
  function showHome()   { stopAudio(); hideAllStates(); resetSel(); $home.style.display = 'flex'; }
  function showLoader() { hideAllStates(); resetSel(); $loader.classList.add('active'); }
  function showEmpty() {
    hideAllStates();
    $list.innerHTML = `
      <li style="padding:52px 24px;text-align:center;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.4" style="margin:0 auto 12px;display:block;opacity:.3">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p style="font-size:15px;font-weight:500;color:var(--t-mid);">검색 결과가 없습니다</p>
        <p style="font-size:13px;color:var(--t-lo);margin-top:6px;">다른 키워드로 검색해 보세요</p>
      </li>`;
    $count.textContent = '';
    $results.classList.add('active');
  }

  /* ── Toast ──────────────────────────────── */
  let _tt = null;
  function toast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => $toast.classList.remove('show'), 2600);
  }

  /* ── Shake ──────────────────────────────── */
  function shake(el) {
    el.animate([
      { transform: 'translateX(0)' }, { transform: 'translateX(-7px)' },
      { transform: 'translateX(7px)' }, { transform: 'translateX(-4px)' },
      { transform: 'translateX(4px)' }, { transform: 'translateX(0)' }
    ], { duration: 360, easing: 'ease' });
  }

  /* ── Escape ─────────────────────────────── */
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Input Handlers ─────────────────────── */
  $search.addEventListener('input', () => {
    const v = $search.value;
    $clear.classList.toggle('visible', v.length > 0);
    clearTimeout(debTimer);
    if (!v.trim()) { showHome(); return; }
    debTimer = setTimeout(() => doSearch(v), 440);
  });

  $search.addEventListener('keydown', e => {
    if (e.key === 'Enter') { clearTimeout(debTimer); doSearch($search.value); }
  });

  $clear.addEventListener('click', () => {
    $search.value = '';
    $clear.classList.remove('visible');
    $search.focus();
    showHome();
  });

  document.querySelectorAll('.hint-chip').forEach(c => {
    c.addEventListener('click', () => {
      $search.value = c.dataset.query;
      $clear.classList.add('visible');
      doSearch(c.dataset.query);
    });
  });

  showHome();
})();
</script>
</body>
</html>

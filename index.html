<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Midnight With Groove — 신청곡</title>

<style>

:root{
--bg:#121212;
--surface:#1e1e1e;
--text:#ffffff;
--text-sub:#b3b3b3;
--violet:#5F4B8B;
--font:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:var(--font);
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
padding:16px 20px;
border-bottom:1px solid #2a2a2a;
display:flex;
justify-content:center;
align-items:center;
}

.logo-container img{
height:19px;
cursor:pointer;
}

/* MAIN */

main{
flex:1;
padding:20px;
max-width:520px;
margin:auto;
display:flex;
flex-direction:column;
}

/* SEARCH TITLE */

.search-header{
font-size:16px;
margin-bottom:12px;
}

/* SEARCH CARD */

.search-card{
background:var(--surface);
border-radius:12px;
padding:12px 14px;
box-shadow:0 4px 12px rgba(0,0,0,.25);
position:sticky;
top:12px;
z-index:10;
margin-bottom:16px;
}

.search-input-container{
display:flex;
align-items:center;
}

.search-input{
flex:1;
padding:10px 14px;
border:none;
outline:2px solid rgba(255,255,255,.06);
background:transparent;
border-radius:10px;
color:white;
font-size:16px;
}

.search-input:focus{
outline:2px solid var(--violet);
}

.search-btn{
margin-left:10px;
width:36px;
height:36px;
border:none;
border-radius:50%;
background:var(--violet);
color:white;
cursor:pointer;
font-size:14px;
}

/* TRACK LIST */

.track-list{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.track-item{
display:flex;
align-items:center;
background:var(--surface);
border-radius:8px;
padding:8px 10px;
margin-bottom:6px;
cursor:pointer;
transition:.18s;
will-change:transform;
}

.track-item:hover{
background:#2a2a2a;
}

.track-item img{
width:56px;
height:56px;
border-radius:8px;
object-fit:cover;
margin-right:12px;
}

.track-info{
flex:1;
overflow:hidden;
}

.track-title{
font-size:17px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.track-artist{
font-size:15px;
color:var(--text-sub);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* REQUEST CARD */

.request-card{
background:var(--surface);
border-radius:14px;
padding:16px;
margin-top:12px;
text-align:center;
border:1px solid rgba(95,75,139,.25);
}

.request-card img{
width:110px;
height:110px;
border-radius:12px;
margin-bottom:10px;
object-fit:cover;
}

.request-card h3{
font-size:17px;
margin-bottom:4px;
}

.request-card p{
font-size:14px;
color:var(--text-sub);
margin-bottom:10px;
}

.track-meta{
color:rgba(255,255,255,.6);
}

.nickname-input{
margin-bottom:10px;
}

.nickname-input input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
text-align:center;
}

.request-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:var(--violet);
color:white;
font-size:14px;
cursor:pointer;
}

/* FOOTER */

footer{
padding:20px;
text-align:center;
border-top:1px solid #2a2a2a;
}

footer p{
font-size:12px;
color:var(--text-sub);
}

/* LOADER */

.loader{
text-align:center;
padding:20px;
color:var(--violet);
}

/* SEARCH CLEAR BUTTON 제거 */

input::-webkit-search-cancel-button{
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo-container" onclick="location.href='.'">
<img src="logo.jpg">
</div>
</header>

<main>

<div class="search-header">곡 검색</div>

<div class="search-card">
<div class="search-input-container">
<input id="searchInput" class="search-input" placeholder="곡명 또는 아티스트">
<button class="search-btn" onclick="searchMusic()">🔍</button>
</div>
</div>

<div id="loader" class="loader" style="display:none">로딩 중</div>

<div id="trackList" class="track-list"></div>

<div id="requestArea" class="request-card" style="display:none">

<img id="selImage">

<h3 id="selTitle"></h3>
<p id="selArtist"></p>
<p id="selMeta" class="track-meta"></p>

<div class="nickname-input">
<input id="nickname" placeholder="닉네임">
</div>

<button id="submitBtn" class="request-btn" onclick="submitRequest()">신청하기</button>

</div>

</main>

<footer>
<p>Midnight With Groove</p>
<p id="currentDate"></p>
</footer>

<script>

document.getElementById("currentDate").innerText =
new Date().toLocaleDateString("ko-KR");

const GOOGLE_SCRIPT_URL="여기에_URL";

let currentTrack=null;

let lastScript=null;

function searchMusic(){

const query=document.getElementById("searchInput").value.trim();

if(!query)return;

document.getElementById("trackList").innerHTML="";
document.getElementById("requestArea").style.display="none";
document.getElementById("loader").style.display="block";

if(lastScript){
lastScript.remove();
}

const script=document.createElement("script");

script.src=
`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&country=KR&limit=50&callback=handleTracks`;

lastScript=script;

document.body.appendChild(script);

}

function handleTracks(data){

document.getElementById("loader").style.display="none";

const trackList=document.getElementById("trackList");

trackList.innerHTML="";

if(data.results.length===0){

trackList.innerHTML=`<div style="text-align:center;padding:20px;color:#aaa">검색 결과 없음</div>`;

return;

}

data.results.forEach(track=>{

const thumb=track.artworkUrl100.replace("100x100bb","150x150bb");

const item=document.createElement("div");

item.className="track-item";

item.onclick=()=>selectTrack(track,thumb);

item.innerHTML=`
<img src="${thumb}" loading="lazy">
<div class="track-info">
<div class="track-title">${track.trackName}</div>
<div class="track-artist">${track.artistName}</div>
</div>
`;

trackList.appendChild(item);

});

}

function selectTrack(track,thumb){

currentTrack={
song:track.trackName,
artist:track.artistName,
album:track.collectionName,
thumbnail:thumb.replace("150x150bb","300x300bb")
};

document.getElementById("trackList").style.display="none";

document.getElementById("requestArea").style.display="block";

document.getElementById("selImage").src=currentTrack.thumbnail;

document.getElementById("selTitle").innerText=currentTrack.song;

document.getElementById("selArtist").innerText=currentTrack.artist;

if(currentTrack.album!==currentTrack.song){

document.getElementById("selMeta").innerText=currentTrack.album;

}else{

document.getElementById("selMeta").innerText="";

}

}

document.getElementById("requestArea").onclick=()=>{

document.getElementById("trackList").style.display="block";

document.getElementById("requestArea").style.display="none";

};

async function submitRequest(){

const nickname=document.getElementById("nickname").value.trim();

if(!nickname){
alert("닉네임 입력");
return;
}

const btn=document.getElementById("submitBtn");

btn.disabled=true;
btn.innerText="전송 중";

const payload={...currentTrack,nickname};

try{

const res=await fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify(payload),
headers:{"Content-Type":"application/json"}
});

if(res.ok){
alert("신청 완료");
location.reload();
}

}catch(err){

alert("전송 오류");

}

btn.disabled=false;
btn.innerText="신청하기";

}

</script>

</body>
</html>

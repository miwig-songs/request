<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MIWIG PLAYER</title>
    <script>
        /* [1] 최상단 웹앱 URL 입력 */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwueKSIcvYi6Y90nN9iFmGD_zrEsx0LuT8lVeZhoQxztUWp13sNEJVonWXywEtScpIjgw/exec"; 
        const POLL_INTERVAL = 10000;
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg-panel: rgba(7, 7, 26, 0.98); --uv-neon: #B4A4FF; --t-hi: #F5F2FF; --t-mid: #A89DC8; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; background: transparent; }

        /* 로그인 버튼 - 상호작용에서만 사용 */
        #loginBtn {
            position: fixed; top: 20px; left: 20px; z-index: 999999;
            background: #FF0000; color: white; padding: 15px 25px;
            border-radius: 8px; font-weight: 800; cursor: pointer;
            opacity: 0.1; transition: opacity 0.3s;
        }
        #loginBtn:hover { opacity: 1; }

        /* 플레이어 바 *//
        #playerBar {
            position: fixed; bottom: 50px; left: 50%;
            transform: translateX(-50%) translateY(200px);
            width: 550px; background: var(--bg-panel);
            border: 1px solid rgba(148, 130, 255, 0.4);
            border-radius: 24px; padding: 20px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }
        #playerBar.active { transform: translateX(-50%) translateY(0); opacity: 1; }

        .album-art { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; box-shadow: 0 0 20px rgba(180,164,255,0.2); }
        .song-info { flex: 1; overflow: hidden; }
        .song-title { color: var(--t-hi); font-size: 20px; font-weight: 800; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { color: var(--t-mid); font-size: 15px; }
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 0 0 24px 24px; overflow: hidden; }
        #progress-bar { height: 100%; background: linear-gradient(90deg, #7D52C4, var(--uv-neon)); width: 0%; }
        
        /* 실제 유튜브 영상 (아주 작게 숨김 - 오디오 출력용) */
        #yt-wrapper { position: fixed; top: 0; left: 0; width: 200px; height: 150px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loginBtn" onclick="location.href='https://www.youtube.com/login'">
        유튜브 로그인/세션 연결
    </div>

    <div id="yt-wrapper"><div id="player"></div></div>

    <div id="playerBar">
        <img id="albumArt" class="album-art" src="">
        <div class="song-info">
            <div id="songTitle" class="song-title"></div>
            <div id="songArtist" class="song-artist"></div>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, currentId = null, isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '150', width: '200',
                playerVars: { 
                    'autoplay': 1, 'controls': 0, 'mute': 0,
                    'origin': location.origin,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': () => { setInterval(checkQueue, POLL_INTERVAL); checkQueue(); },
                    'onStateChange': (e) => {
                        if (e.data === 0) nextSong();
                        if (e.data === 1) updateProgress();
                    },
                    'onError': () => nextSong()
                }
            });
        }

        async function checkQueue() {
            if (isPlaying) return;
            try {
                const res = await fetch(`${GAS_URL}?action=getNext`);
                const song = await res.json();
                if (song && song.videoId) playSong(song);
            } catch (e) { console.error(e); }
        }

        function playSong(song) {
            currentId = song.id;
            isPlaying = true;
            document.getElementById('songTitle').textContent = song.title;
            document.getElementById('songArtist').textContent = song.artist;
            document.getElementById('albumArt').src = song.thumb;
            document.getElementById('playerBar').classList.add('active');
            
            player.loadVideoById(song.videoId);
            player.unMute();
            player.setVolume(100);
        }

        async function nextSong() {
            isPlaying = false;
            document.getElementById('playerBar').classList.remove('active');
            if (currentId) await fetch(`${GAS_URL}?action=setDone&id=${currentId}`);
            setTimeout(checkQueue, 2000);
        }

        function updateProgress() {
            if (isPlaying && player && player.getDuration) {
                const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('progress-bar').style.width = perc + '%';
                requestAnimationFrame(updateProgress);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIWIG LIVE WAITLIST</title>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwueKSIcvYi6Y90nN9iFmGD_zrEsx0LuT8lVeZhoQxztUWp13sNEJVonWXywEtScpIjgw/exec"; 
        const POLL_INTERVAL = 5000; 
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-body: #0a0a0a;
            --uv-main: #5f4b8b; 
            --border-color: #222;
            --t-hi: #fff;
            --t-mid: #888;
            --font-main: 'Pretendard', 'Noto Sans JP', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); font-family: var(--font-main); color: var(--t-hi); -webkit-font-smoothing: antialiased; }

        /* [Header] */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color); height: 64px;
            display: flex; align-items: center; justify-content: center; padding: 0 20px;
        }
        .nav-inner { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; text-decoration: none; color: inherit; }
        .nav-logo span { color: var(--uv-main); }
        .live-status { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--t-mid); }
        .status-dot { width: 8px; height: 8px; background: #ff4b4b; border-radius: 50%; box-shadow: 0 0 10px rgba(255, 75, 75, 0.5); animation: blink 1.5s infinite; }

        .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--uv-main); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; display: block; }

        /* [NOW PLAYING Card - Mobile Optimized] */
        .on-air-link { text-decoration: none; color: inherit; display: block; margin-bottom: 32px; }
        .on-air-card { 
            background: #111; border: 1px solid var(--uv-main); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); transition: transform 0.1s;
        }
        .on-air-card:active { transform: scale(0.98); background: #161616; }
        
        .oa-art { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #1a1a1a; position: relative; }
        .oa-art img { width: 100%; height: 100%; object-fit: cover; }
        /* 모바일에서 듣기 안내 상시 노출 */
        .oa-play-hint { position: absolute; bottom: 12px; right: 12px; background: var(--uv-main); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .oa-info { display: flex; flex-direction: column; gap: 4px; }
        .oa-title { font-size: 26px; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; }
        .oa-artist { font-size: 17px; color: var(--t-mid); font-weight: 500; margin-bottom: 8px; }
        .oa-requester { align-self: flex-start; background: var(--uv-main); color: #fff; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 800; }

        /* [WAITLIST - Mobile List Optimized] */
        .queue-container { display: flex; flex-direction: column; gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
        .queue-link { text-decoration: none; color: inherit; display: block; background: var(--bg-body); }
        .queue-link:active { background: #161616; }
        
        .queue-card { padding: 16px; display: flex; align-items: center; gap: 14px; position: relative; }
        .q-art { width: 52px; height: 52px; border-radius: 6px; overflow: hidden; flex-shrink: 0; background: #1a1a1a; }
        .q-art img { width: 100%; height: 100%; object-fit: cover; }
        
        .q-info { flex: 1; min-width: 0; padding-right: 40px; }
        .q-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-artist { font-size: 14px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 모바일용 재생 아이콘 */
        .q-play-icon { position: absolute; right: 16px; color: var(--uv-main); opacity: 0.6; }

        .q-user-row { margin-top: 4px; font-size: 11px; font-weight: 800; color: var(--uv-main); text-transform: uppercase; }

        #emptyState { text-align: center; padding: 80px 0; color: var(--t-mid); font-size: 14px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Tablet+ */
        @media (min-width: 480px) {
            .on-air-card { flex-direction: row; align-items: center; padding: 24px; gap: 24px; }
            .oa-art { width: 180px; }
            .oa-title { font-size: 30px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="#" class="nav-logo">MIWIG <span>SONGS</span></a>
        <div class="live-status"><span class="status-dot"></span>LIVE</div>
    </div>
</nav>

<div class="container">
    <div id="onAirSection" style="display:none;">
        <span class="section-title">Now Playing</span>
        <a href="" id="onAirLink" target="_blank" class="on-air-link">
            <div class="on-air-card">
                <div class="oa-art">
                    <img id="onAirArt" src="" alt="">
                    <div class="oa-play-hint">▶ LISTEN</div>
                </div>
                <div class="oa-info">
                    <div class="oa-title" id="onAirTitle">Title</div>
                    <div class="oa-artist" id="onAirArtist">Artist</div>
                    <div class="oa-requester">
                        BY <span id="onAirUser">Guest</span>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <div id="queueSection" style="display:none;">
        <span class="section-title">Waitlist</span>
        <div class="queue-container" id="queueContainer">
            </div>
    </div>

    <div id="emptyState" style="display:none;">
        <p>대기 중인 신청곡이 없습니다.</p>
    </div>
</div>

<script>
    async function fetchWaitlist() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            if (data.result !== "success" || !data.queue) return;
            const q = data.queue;

            if (q.length === 0) {
                document.getElementById('onAirSection').style.display = 'none';
                document.getElementById('queueSection').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            // 1. On Air
            const current = q[0];
            document.getElementById('onAirSection').style.display = 'block';
            document.getElementById('onAirTitle').textContent = current.title;
            document.getElementById('onAirArtist').textContent = current.artist;
            document.getElementById('onAirArt').src = current.thumbUrl || '';
            document.getElementById('onAirUser').textContent = current.nickname || 'GUEST';
            document.getElementById('onAirLink').href = `https://music.youtube.com/watch?v=${current.youtubeId}`;

            // 2. Waitlist
            const nextList = q.slice(1);
            const container = document.getElementById('queueContainer');
            
            if (nextList.length === 0) {
                document.getElementById('queueSection').style.display = 'none';
            } else {
                document.getElementById('queueSection').style.display = 'block';
                container.innerHTML = nextList.map((song) => `
                    <a href="https://music.youtube.com/watch?v=${song.youtubeId}" target="_blank" class="queue-link">
                        <div class="queue-card">
                            <div class="q-art"><img src="${song.thumbUrl || ''}" alt=""></div>
                            <div class="q-info">
                                <div class="q-title">${song.title}</div>
                                <div class="q-artist">${song.artist}</div>
                                <div class="q-user-row">REQ: ${song.nickname || 'GUEST'}</div>
                            </div>
                            <div class="q-play-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </a>
                `).join('');
            }
        } catch (e) { console.error(e); }
    }
    fetchWaitlist();
    setInterval(fetchWaitlist, POLL_INTERVAL);
</script>

</body>
</html>

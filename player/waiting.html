<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIWIG LIVE WAITLIST</title>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwueKSIcvYi6Y90nN9iFmGD_zrEsx0LuT8lVeZhoQxztUWp13sNEJVonWXywEtScpIjgw/exec"; 
        const POLL_INTERVAL = 5000; 
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-deep: #05050a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --uv-main: #5f4b8b; 
            --uv-soft: rgba(95, 75, 139, 0.2);
            --uv-border: rgba(95, 75, 139, 0.3);
            --t-hi: #FFFFFF; 
            --t-mid: #A8A8B3; 
            --font-main: 'Pretendard', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-deep); 
            font-family: var(--font-main); 
            color: var(--t-hi); 
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* [Header - Request Page Style] */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { font-size: 18px; font-weight: 900; letter-spacing: 0.1em; color: var(--t-hi); }
        .nav-logo span { color: var(--uv-main); }
        .status-dot { width: 8px; height: 8px; background: #ff4b4b; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px #ff4b4b; animation: pulse 1.5s infinite; }
        .live-label { font-size: 12px; font-weight: 800; color: var(--t-mid); letter-spacing: 0.1em; }

        .content { padding: 24px; max-width: 600px; margin: 0 auto; padding-bottom: calc(40px + var(--safe-bottom)); }

        /* [Section Titles] */
        .section-title { font-size: 13px; font-weight: 900; color: var(--uv-main); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 16px; margin-top: 32px; display: block; }

        /* [ON AIR Card] */
        .on-air-card { 
            background: linear-gradient(145deg, rgba(95, 75, 139, 0.15), rgba(0,0,0,0));
            border: 1px solid var(--uv-border);
            border-radius: 24px; padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .oa-layout { display: flex; flex-direction: column; gap: 20px; }
        .oa-art { width: 100%; aspect-ratio: 1/1; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .oa-art img { width: 100%; height: 100%; object-fit: cover; }
        .oa-info { min-width: 0; }
        .oa-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; font-feature-settings: "palt"; }
        .oa-artist { font-size: 18px; color: var(--t-mid); margin-bottom: 16px; font-weight: 500; }
        .oa-requester { display: inline-flex; align-items: center; gap: 8px; background: var(--uv-main); color: #fff; padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 800; }

        /* [Waitlist Cards] */
        .queue-container { display: grid; gap: 12px; }
        .queue-card { 
            background: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 18px; padding: 14px 18px; 
            display: flex; align-items: center; gap: 16px;
            transition: transform 0.2s;
        }
        .queue-card:active { transform: scale(0.98); background: rgba(255,255,255,0.06); }
        .q-art { width: 54px; height: 54px; border-radius: 10px; overflow: hidden; flex-shrink: 0; background: #111; }
        .q-art img { width: 100%; height: 100%; object-fit: cover; }
        .q-info { flex: 1; min-width: 0; }
        .q-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-feature-settings: "palt"; }
        .q-artist { font-size: 14px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-user { font-size: 12px; font-weight: 800; color: var(--uv-main); background: var(--uv-soft); padding: 4px 10px; border-radius: 6px; flex-shrink: 0; }

        /* Empty State */
        #emptyState { text-align: center; padding: 60px 0; opacity: 0.5; }
        .empty-icon { font-size: 40px; margin-bottom: 10px; display: block; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Tablet over layout */
        @media (min-width: 480px) {
            .oa-layout { flex-direction: row; align-items: center; }
            .oa-art { width: 180px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">MIWIG <span>WAITLIST</span></div>
    <div class="live-label"><span class="status-dot"></span>LIVE</div>
</nav>

<div class="content">
    <div id="onAirSection" style="display:none;">
        <span class="section-title">Now Playing</span>
        <div class="on-air-card">
            <div class="oa-layout">
                <div class="oa-art"><img id="onAirArt" src="" alt=""></div>
                <div class="oa-info">
                    <div class="oa-title" id="onAirTitle">Connecting...</div>
                    <div class="oa-artist" id="onAirArtist">-</div>
                    <div class="oa-requester">
                        <span>Requested by</span>
                        <span id="onAirUser">Guest</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="queueSection" style="display:none;">
        <span class="section-title">Up Next</span>
        <div class="queue-container" id="queueContainer">
            </div>
    </div>

    <div id="emptyState">
        <span class="empty-icon">💿</span>
        <p>대기 중인 신청곡이 없습니다.</p>
    </div>
</div>

<script>
    async function fetchWaitlist() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            
            if (data.result !== "success" || !data.queue) return;
            const q = data.queue;

            if (q.length === 0) {
                document.getElementById('onAirSection').style.display = 'none';
                document.getElementById('queueSection').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            // 1. 현재 곡 (ON AIR) 업데이트
            const current = q[0];
            document.getElementById('onAirSection').style.display = 'block';
            document.getElementById('onAirTitle').textContent = current.title;
            document.getElementById('onAirArtist').textContent = current.artist;
            document.getElementById('onAirArt').src = current.thumbUrl || '';
            document.getElementById('onAirUser').textContent = current.nickname || 'GUEST';

            // 2. 대기 목록 (UP NEXT) 업데이트
            const nextList = q.slice(1);
            const container = document.getElementById('queueContainer');
            
            if (nextList.length === 0) {
                document.getElementById('queueSection').style.display = 'none';
            } else {
                document.getElementById('queueSection').style.display = 'block';
                container.innerHTML = nextList.map((song) => `
                    <div class="queue-card">
                        <div class="q-art">
                            <img src="${song.thumbUrl || ''}" alt="">
                        </div>
                        <div class="q-info">
                            <div class="q-title">${song.title}</div>
                            <div class="q-artist">${song.artist}</div>
                        </div>
                        <div class="q-user">${song.nickname || 'GUEST'}</div>
                    </div>
                `).join('');
            }
        } catch (e) {
            console.error("Fetch Error:", e);
        }
    }

    fetchWaitlist();
    setInterval(fetchWaitlist, POLL_INTERVAL);
</script>

</body>
</html>

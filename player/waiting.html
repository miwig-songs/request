<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIWIG LIVE WAITLIST</title>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwueKSIcvYi6Y90nN9iFmGD_zrEsx0LuT8lVeZhoQxztUWp13sNEJVonWXywEtScpIjgw/exec"; 
        const POLL_INTERVAL = 5000; 
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { 
            --bg-body: #0a0a0a;
            --uv-main: #5f4b8b; 
            --border-color: #222;
            --t-hi: #fff;
            --t-mid: #888;
            --font-main: 'Pretendard', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); font-family: var(--font-main); color: var(--t-hi); -webkit-font-smoothing: antialiased; }

        /* [Header] */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); height: 60px;
            display: flex; align-items: center; justify-content: center; padding: 0 20px;
        }
        .nav-inner { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 18px; font-weight: 800; text-decoration: none; color: inherit; }
        .nav-logo span { color: var(--uv-main); }
        .live-status { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: #555; }
        .status-dot { width: 6px; height: 6px; background: #ff4b4b; border-radius: 50%; box-shadow: 0 0 10px #ff4b4b; animation: blink 1.5s infinite; }

        .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
        .section-title { font-size: 12px; font-weight: 800; color: var(--uv-main); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; display: block; }

        /* [NOW PLAYING - Pure Info] */
        .on-air-card { 
            background: #111; border: 1px solid var(--border-color); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;
        }
        .oa-art { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #000; }
        .oa-art img { width: 100%; height: 100%; object-fit: cover; }
        .oa-info { display: flex; flex-direction: column; gap: 4px; }
        .oa-title { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 2px; }
        .oa-artist { font-size: 16px; color: var(--t-mid); margin-bottom: 8px; }
        .oa-req { align-self: flex-start; background: #1a1a1a; color: var(--uv-main); border: 1px solid var(--uv-main); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 800; }

        /* [WAITLIST - Actionable] */
        .queue-container { display: flex; flex-direction: column; gap: 10px; }
        .queue-link { text-decoration: none; color: inherit; display: block; }
        .queue-card { 
            background: #111; border: 1px solid var(--border-color); border-radius: 14px;
            padding: 14px; display: flex; align-items: center; gap: 14px; transition: 0.2s;
        }
        .queue-link:active .queue-card { background: #1a1a1a; border-color: var(--uv-main); }

        .q-art { width: 52px; height: 52px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .q-art img { width: 100%; height: 100%; object-fit: cover; }
        .q-info { flex: 1; min-width: 0; }
        .q-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-artist { font-size: 13px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .q-play-btn { 
            width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--uv-main);
            display: flex; align-items: center; justify-content: center; color: var(--uv-main);
            box-shadow: 0 0 10px rgba(95, 75, 139, 0.2);
        }

        #empty { text-align: center; padding: 100px 0; color: var(--t-mid); font-size: 14px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (min-width: 480px) {
            .on-air-card { flex-direction: row; align-items: center; gap: 28px; padding: 28px; }
            .oa-art { width: 200px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="#" class="nav-logo">MIWIG <span>SONGS</span></a>
        <div class="live-status"><div class="status-dot"></div>LIVE</div>
    </div>
</nav>

<div class="container">
    <div id="onAirSection" style="display:none;">
        <span class="section-title">Now Playing</span>
        <div class="on-air-card">
            <div class="oa-art"><img id="onAirArt" src="" alt=""></div>
            <div class="oa-info">
                <div class="oa-title" id="onAirTitle">Title</div>
                <div class="oa-artist" id="onAirArtist">Artist</div>
                <div class="oa-req">REQ: <span id="onAirUser">GUEST</span></div>
            </div>
        </div>
    </div>

    <div id="queueSection" style="display:none;">
        <span class="section-title">Waitlist Queue</span>
        <div class="queue-container" id="queueContainer">
            </div>
    </div>

    <div id="empty" style="display:none;">현재 대기 목록이 비어 있습니다.</div>
</div>

<script>
    async function updateWaitlist() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            if (data.result !== "success" || !data.queue) return;
            const q = data.queue;

            if (q.length === 0) {
                document.getElementById('onAirSection').style.display = 'none';
                document.getElementById('queueSection').style.display = 'none';
                document.getElementById('empty').style.display = 'block';
                return;
            }

            document.getElementById('empty').style.display = 'none';

            // Now Playing (정보 노출 전용)
            const cur = q[0];
            document.getElementById('onAirSection').style.display = 'block';
            document.getElementById('onAirTitle').textContent = cur.title;
            document.getElementById('onAirArtist').textContent = cur.artist;
            document.getElementById('onAirArt').src = cur.thumbUrl || '';
            document.getElementById('onAirUser').textContent = (cur.nickname || 'GUEST').toUpperCase();

            // Waitlist (클릭 가능)
            const next = q.slice(1);
            const container = document.getElementById('queueContainer');
            if (next.length === 0) {
                document.getElementById('queueSection').style.display = 'none';
            } else {
                document.getElementById('queueSection').style.display = 'block';
                container.innerHTML = next.map((song) => `
                    <a href="https://music.youtube.com/watch?v=${song.youtubeId}" target="_blank" class="queue-link">
                        <div class="queue-card">
                            <div class="q-art"><img src="${song.thumbUrl || ''}" alt=""></div>
                            <div class="q-info">
                                <div class="q-title">${song.title}</div>
                                <div class="q-artist">${song.artist}</div>
                            </div>
                            <div class="q-play-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </a>
                `).join('');
            }
        } catch (e) { console.error(e); }
    }
    updateWaitlist();
    setInterval(updateWaitlist, POLL_INTERVAL);
</script>

</body>
</html>

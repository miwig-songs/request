<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIWIG LIVE WAITLIST</title>
    <script>
        /* [설정] 플레이어와 동일한 GAS URL을 사용하세요 */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwueKSIcvYi6Y90nN9iFmGD_zrEsx0LuT8lVeZhoQxztUWp13sNEJVonWXywEtScpIjgw/exec"; 
        const POLL_INTERVAL = 5000; 
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-deep: #020206;
            --bg-card: rgba(255, 255, 255, 0.03);
            --uv-main: #5f4b8b; 
            --uv-soft: rgba(95, 75, 139, 0.2);
            --uv-border: rgba(95, 75, 139, 0.3);
            --t-hi: #FFFFFF; 
            --t-mid: #A1A1A1; 
            --t-dim: rgba(255, 255, 255, 0.1);
            --font-main: 'Pretendard', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-deep); 
            font-family: var(--font-main); 
            color: var(--t-hi); 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--bg-deep) 70%);
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }

        /* [Header] */
        header { text-align: center; margin-bottom: 80px; }
        .logo { font-size: 14px; font-weight: 900; letter-spacing: 0.5em; color: var(--uv-main); text-transform: uppercase; margin-bottom: 10px; display: block; }
        h1 { font-size: 42px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
        h1 span { color: var(--uv-main); }

        /* [Current Playing - On Air] */
        .on-air-section { margin-bottom: 60px; }
        .section-label { font-size: 12px; font-weight: 800; color: var(--uv-main); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--uv-border); }
        .on-air-badge { background: #ff4b4b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .on-air-card { 
            background: rgba(95, 75, 139, 0.1); border: 1px solid var(--uv-border); 
            border-radius: 30px; padding: 40px; display: flex; align-items: center; gap: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 20px rgba(95, 75, 139, 0.1);
        }
        .on-air-art { width: 200px; height: 200px; border-radius: 20px; overflow: hidden; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .on-air-art img { width: 100%; height: 100%; object-fit: cover; }
        .on-air-info { flex: 1; min-width: 0; }
        .on-air-title { font-size: 48px; font-weight: 700; margin-bottom: 10px; line-height: 1.1; font-feature-settings: "palt"; }
        .on-air-artist { font-size: 24px; color: var(--t-mid); margin-bottom: 20px; }
        .requester-info { display: flex; align-items: center; gap: 12px; }
        .user-tag { background: var(--uv-main); color: #fff; padding: 6px 16px; border-radius: 100px; font-size: 14px; font-weight: 800; }

        /* [Queue List] */
        .queue-list { display: grid; gap: 15px; }
        .queue-card { 
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; padding: 20px 30px; display: flex; align-items: center; gap: 20px;
            transition: all 0.3s var(--bezier);
        }
        .queue-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.05); border-color: var(--uv-border); }
        .queue-index { font-size: 18px; font-weight: 800; color: var(--t-dim); width: 30px; }
        .queue-art { width: 60px; height: 60px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
        .queue-art img { width: 100%; height: 100%; object-fit: cover; }
        .queue-info { flex: 1; min-width: 0; }
        .queue-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-artist { font-size: 15px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-user { font-size: 13px; color: var(--uv-main); font-weight: 800; background: var(--uv-soft); padding: 4px 12px; border-radius: 8px; }

        /* [Empty State] */
        #emptyState { text-align: center; padding: 100px 0; display: none; }
        .empty-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.2; }
        .empty-msg { color: var(--t-mid); font-weight: 500; }

        /* [Responsive] */
        @media (max-width: 768px) {
            .on-air-card { flex-direction: column; padding: 30px; text-align: center; }
            .on-air-art { width: 100%; height: auto; aspect-ratio: 1/1; }
            .on-air-title { font-size: 32px; }
            .requester-info { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="logo">MIWIG STREAMING</span>
        <h1>LIVE <span>WAITLIST</span></h1>
    </header>

    <div class="on-air-section" id="onAirSection" style="display:none;">
        <div class="section-label">
            <span class="on-air-badge">ON AIR</span>
            NOW PLAYING
        </div>
        <div class="on-air-card">
            <div class="on-air-art"><img id="onAirArt" src="" alt="Album Art"></div>
            <div class="on-air-info">
                <div class="on-air-title" id="onAirTitle">MIWIG SYSTEM</div>
                <div class="on-air-artist" id="onAirArtist">Loading grooves...</div>
                <div class="requester-info">
                    <span class="user-tag" id="onAirUser">RESERVED</span>
                </div>
            </div>
        </div>
    </div>

    <div id="queueSection">
        <div class="section-label">UP NEXT</div>
        <div class="queue-list" id="queueContainer">
            </div>
    </div>

    <div id="emptyState">
        <div class="empty-icon">💿</div>
        <div class="empty-msg">대기 중인 곡이 없습니다.<br>리퀘스트 페이지에서 음악을 신청해보세요!</div>
    </div>
</div>

<script>
    async function updateWaitlist() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            
            if (data.result !== "success" || !data.queue) return;
            const q = data.queue;

            if (q.length === 0) {
                document.getElementById('onAirSection').style.display = 'none';
                document.getElementById('queueSection').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            // 1. 현재 곡 (ON AIR) 업데이트
            const current = q[0];
            document.getElementById('onAirSection').style.display = 'block';
            document.getElementById('onAirTitle').textContent = current.title;
            document.getElementById('onAirArtist').textContent = current.artist;
            document.getElementById('onAirArt').src = current.thumbUrl || 'https://via.placeholder.com/200';
            document.getElementById('onAirUser').textContent = current.nickname || 'GUEST';

            // 2. 대기 목록 (UP NEXT) 업데이트
            const nextList = q.slice(1);
            const container = document.getElementById('queueContainer');
            
            if (nextList.length === 0) {
                document.getElementById('queueSection').style.display = 'none';
            } else {
                document.getElementById('queueSection').style.display = 'block';
                container.innerHTML = nextList.map((song, index) => `
                    <div class="queue-card">
                        <div class="queue-index">${index + 1}</div>
                        <div class="queue-art"><img src="${song.thumbUrl || 'https://via.placeholder.com/60'}" alt=""></div>
                        <div class="queue-info">
                            <div class="queue-title">${song.title}</div>
                            <div class="queue-artist">${song.artist}</div>
                        </div>
                        <div class="queue-user">${song.nickname || 'GUEST'}</div>
                    </div>
                `).join('');
            }

        } catch (e) {
            console.error("Waitlist Update Error:", e);
        }
    }

    // 초기 실행 및 반복 실행
    updateWaitlist();
    setInterval(updateWaitlist, POLL_INTERVAL);
</script>

</body>
</html>

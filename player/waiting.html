<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIWIG LIVE WAITLIST</title>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwueKSIcvYi6Y90nN9iFmGD_zrEsx0LuT8lVeZhoQxztUWp13sNEJVonWXywEtScpIjgw/exec"; 
        const POLL_INTERVAL = 5000; 
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-body: #0a0a0a;
            --bg-header: #0a0a0a;
            --uv-main: #5f4b8b; 
            --border-color: #222;
            --t-hi: #fff;
            --t-mid: #888;
            --font-main: 'Pretendard', 'Noto Sans JP', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-body); 
            font-family: var(--font-main); 
            color: var(--t-hi); 
            -webkit-font-smoothing: antialiased;
        }

        /* [Header] */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            height: 64px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px;
        }
        .nav-inner { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; cursor: pointer; }
        .nav-logo span { color: var(--uv-main); }
        .live-status { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--t-mid); }
        .status-dot { width: 8px; height: 8px; background: #ff4b4b; border-radius: 50%; box-shadow: 0 0 10px rgba(255, 75, 75, 0.5); animation: blink 1.5s infinite; }

        .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--uv-main); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* [NOW PLAYING Card] */
        .on-air-card { 
            background: #111;
            border: 1px solid var(--uv-main);
            border-radius: 16px; padding: 24px; margin-bottom: 40px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .oa-art { width: 100%; aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; background: #1a1a1a; }
        .oa-art img { width: 100%; height: 100%; object-fit: cover; }
        .oa-info { display: flex; flex-direction: column; gap: 4px; }
        .oa-title { font-size: 28px; font-weight: 800; line-height: 1.2; letter-spacing: -0.03em; }
        .oa-artist { font-size: 18px; color: var(--t-mid); font-weight: 500; margin-bottom: 12px; }
        .oa-requester { align-self: flex-start; background: var(--uv-main); color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 800; }

        /* [WAITLIST Cards - Clickable] */
        .queue-container { display: flex; flex-direction: column; gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        
        /* 🚨 클릭 유도를 위한 링크 스타일 */
        .queue-link { text-decoration: none; color: inherit; display: block; }
        .queue-link:active .queue-card { background: #161616; }

        .queue-card { 
            background: var(--bg-body);
            padding: 16px; 
            display: flex; align-items: center; gap: 16px;
        }
        .q-art { width: 50px; height: 50px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: #1a1a1a; }
        .q-art img { width: 100%; height: 100%; object-fit: cover; }
        .q-info { flex: 1; min-width: 0; }
        .q-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-artist { font-size: 14px; color: var(--t-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 🚨 재생 아이콘 추가 */
        .q-play-icon { 
            width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--uv-main);
            display: flex; align-items: center; justify-content: center; color: var(--uv-main);
            margin-left: auto; flex-shrink: 0;
        }

        .q-user { font-size: 11px; font-weight: 800; color: var(--uv-main); margin-top: 4px; display: block; }

        #emptyState { text-align: center; padding: 60px 0; color: var(--t-mid); font-size: 15px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (min-width: 480px) {
            .on-air-card { flex-direction: row; align-items: center; padding: 32px; gap: 32px; }
            .oa-art { width: 200px; }
            .oa-title { font-size: 32px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="nav-logo" onclick="location.reload()">MIWIG <span>SONGS</span></div>
        <div class="live-status"><span class="status-dot"></span>LIVE STATUS</div>
    </div>
</nav>

<div class="container">
    <div id="onAirSection" style="display:none;">
        <span class="section-title">Now Playing</span>
        <div class="on-air-card">
            <div class="oa-art"><img id="onAirArt" src="" alt=""></div>
            <div class="oa-info">
                <div class="oa-title" id="onAirTitle">Title</div>
                <div class="oa-artist" id="onAirArtist">Artist</div>
                <div class="oa-requester">
                    Requested by <span id="onAirUser">Guest</span>
                </div>
            </div>
        </div>
    </div>

    <div id="queueSection" style="display:none;">
        <span class="section-title">Waitlist Queue</span>
        <div class="queue-container" id="queueContainer">
            </div>
    </div>

    <div id="emptyState" style="display:none;">
        <p>현재 대기 중인 신청곡이 없습니다.</p>
    </div>
</div>

<script>
    async function fetchWaitlist() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            if (data.result !== "success" || !data.queue) return;
            const q = data.queue;

            if (q.length === 0) {
                document.getElementById('onAirSection').style.display = 'none';
                document.getElementById('queueSection').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            // 1. Now Playing
            const current = q[0];
            document.getElementById('onAirSection').style.display = 'block';
            document.getElementById('onAirTitle').textContent = current.title;
            document.getElementById('onAirArtist').textContent = current.artist;
            document.getElementById('onAirArt').src = current.thumbUrl || '';
            document.getElementById('onAirUser').textContent = current.nickname || 'GUEST';

            // 2. Waitlist
            const nextList = q.slice(1);
            const container = document.getElementById('queueContainer');
            
            if (nextList.length === 0) {
                document.getElementById('queueSection').style.display = 'none';
            } else {
                document.getElementById('queueSection').style.display = 'block';
                container.innerHTML = nextList.map((song) => `
                    <a href="https://music.youtube.com/watch?v=${song.youtubeId}" target="_blank" class="queue-link">
                        <div class="queue-card">
                            <div class="q-art"><img src="${song.thumbUrl || ''}" alt=""></div>
                            <div class="q-info">
                                <div class="q-title">${song.title}</div>
                                <div class="q-artist">${song.artist}</div>
                                <span class="q-user">REQ: ${song.nickname || 'GUEST'}</span>
                            </div>
                            <div class="q-play-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </a>
                `).join('');
            }
        } catch (e) { console.error(e); }
    }
    fetchWaitlist();
    setInterval(fetchWaitlist, POLL_INTERVAL);
</script>

</body>
</html>
